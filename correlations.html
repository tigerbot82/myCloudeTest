// ── Weather archive (Open-Meteo, daily) ──────────────────────────
async function fetchWeatherArchive(startDate) {
  const endDate = new Date().toISOString().slice(0, 10);
  const cKey = `health_wx_arch_${startDate}`;
  try {
    const c = JSON.parse(localStorage.getItem(cKey) || 'null');
    if (c && Date.now() - c.t < 12 * 3600 * 1000) return c.d;
  } catch(e) {}

  const url = 'https://archive-api.open-meteo.com/v1/archive'
    + '?latitude=48.2416&longitude=16.4442'
    + '&daily=temperature_2m_mean,sunshine_duration,precipitation_sum,daylight_duration'
    + `&start_date=${startDate}&end_date=${endDate}`
    + '&timezone=Europe%2FVienna';

  const resp = await fetch(url);
  if (!resp.ok) throw new Error('weather archive ' + resp.status);
  const j = await resp.json();

  const byDate = {};
  (j.daily?.time || []).forEach((d, i) => {
    byDate[d] = {
      tempMean: j.daily.temperature_2m_mean[i],
      sunshine: (j.daily.sunshine_duration[i] ?? 0) / 3600,
      daylight: (j.daily.daylight_duration[i] ?? 0) / 3600,
      precip:   j.daily.precipitation_sum[i] ?? 0,
    };
  });

  try { localStorage.setItem(cKey, JSON.stringify({t: Date.now(), d: byDate})); } catch(e) {}
  return byDate;
}

// ── Air quality archive (Open-Meteo CAMS, hourly → daily) ────────
async function fetchAirQualityArchive(startDate) {
  const endDate = new Date().toISOString().slice(0, 10);
  const cKey = `health_aq_arch_${startDate}`;
  try {
    const c = JSON.parse(localStorage.getItem(cKey) || 'null');
    if (c && Date.now() - c.t < 12 * 3600 * 1000) return c.d;
  } catch(e) {}

  const url = 'https://air-quality-api.open-meteo.com/v1/air-quality'
    + '?latitude=48.2416&longitude=16.4442'
    + '&hourly=pm2_5,pm10,nitrogen_dioxide,ozone,european_aqi,uv_index'
    + `&start_date=${startDate}&end_date=${endDate}`
    + '&timezone=Europe%2FVienna';

  const resp = await fetch(url);
  if (!resp.ok) throw new Error('air quality ' + resp.status);
  const j = await resp.json();

  // Aggregate hourly → daily (mean for pollutants, max for UV)
  const acc = {};
  (j.hourly?.time || []).forEach((ts, i) => {
    const date = ts.slice(0, 10);
    if (!acc[date]) acc[date] = { pm2_5:[], pm10:[], no2:[], o3:[], aqi:[], uv:[] };
    const a = acc[date];
    if (j.hourly.pm2_5?.[i]            != null) a.pm2_5.push(j.hourly.pm2_5[i]);
    if (j.hourly.pm10?.[i]             != null) a.pm10.push(j.hourly.pm10[i]);
    if (j.hourly.nitrogen_dioxide?.[i] != null) a.no2.push(j.hourly.nitrogen_dioxide[i]);
    if (j.hourly.ozone?.[i]            != null) a.o3.push(j.hourly.ozone[i]);
    if (j.hourly.european_aqi?.[i]     != null) a.aqi.push(j.hourly.european_aqi[i]);
    if (j.hourly.uv_index?.[i]         != null) a.uv.push(j.hourly.uv_index[i]);
  });

  const mean = arr => arr.length ? arr.reduce((s,v)=>s+v,0)/arr.length : null;
  const max  = arr => arr.length ? Math.max(...arr) : null;

  const byDate = {};
  for (const [date, a] of Object.entries(acc)) {
    byDate[date] = {
      pm2_5: mean(a.pm2_5),
      pm10:  mean(a.pm10),
      no2:   mean(a.no2),
      o3:    mean(a.o3),
      aqi:   mean(a.aqi),
      uv:    max(a.uv),
    };
  }

  try { localStorage.setItem(cKey, JSON.stringify({t: Date.now(), d: byDate})); } catch(e) {}
  return byDate;
}

// ── Pearson + rolling ─────────────────────────────────────────────
function pearson(xs, ys) {
  const pairs = xs.map((x,i) => [x, ys[i]]).filter(([x,y]) => x != null && y != null && !isNaN(x) && !isNaN(y));
  if (pairs.length < 3) return null;
  const n = pairs.length;
  const mx = pairs.reduce((s,[x]) => s+x, 0) / n;
  const my = pairs.reduce((s,[,y]) => s+y, 0) / n;
  let num=0, dx2=0, dy2=0;
  for (const [x,y] of pairs) { const a=x-mx, b=y-my; num+=a*b; dx2+=a*a; dy2+=b*b; }
  const denom = Math.sqrt(dx2*dy2);
  return denom < 1e-10 ? 0 : parseFloat((num/denom).toFixed(3));
}

function rollingCorr(dates, xs, ys, win) {
  return dates.slice(win-1).map((_, i) => ({
    date: dates[i+win-1],
    r:    pearson(xs.slice(i, i+win), ys.slice(i, i+win)),
  }));
}

function corrStyle(r) {
  if (r == null) return 'color:rgba(14,184,255,0.45);border-left-color:rgba(14,184,255,0.2)';
  const a = (0.55 + Math.abs(r) * 0.45).toFixed(2);
  return r >= 0
    ? `color:rgba(14,184,255,${a});border-left-color:rgba(14,184,255,${a})`
    : `color:rgba(255,80,80,${a});border-left-color:rgba(255,80,80,${a})`;
}

// ── Slice of Garmin data honoring corrHistory ─────────────────────
function getCorrelSlice() {
  if (!corrAllData.length) return [];
  const lim = (corrHistory > 0 && corrHistory < corrAllData.length)
    ? corrHistory : corrAllData.length;
  return corrAllData.slice(-lim);
}

    'Steps':          data.map(d => d.steps                   ?? null),
    'Distance km':    data.map(d => d.distanceKm              ?? null),
    'Intensity Min':  data.map(d => d.intensityMinutes        ?? null),
    'Active Cal':     data.map(d => d.activeCalories          ?? null),
    'Training Ready': data.map(d => d.trainingReadiness       ?? null),
    'Endurance':      data.map(d => d.enduranceScore          ?? null),
    'Fitness Age':    data.map(d => d.fitnessAge              ?? null),
    'VO2max':         data.map(d => d.vo2max                  ?? null),
    'Hill Score':     data.map(d => d.hillScore               ?? null),
    'Weight kg':      data.map(d => d.weight?.kg              ?? null),
    'Body Fat %':     data.map(d => d.weight?.bodyFatPct      ?? null),
    'Blood Pressure': data.map(d => d.bloodPressure?.systolic ?? null),
  };
  customVarDefs.forEach(v => {
    H[v.name] = data.map(d => d.custom?.[v.name] ?? null);
  });
  const WX = {
    'Temp °C':    dates.map(d => wxData?.[d]?.tempMean ?? null),
    'Sunshine h': dates.map(d => wxData?.[d]?.sunshine ?? null),
    'Daylight h': dates.map(d => wxData?.[d]?.daylight ?? null),
    'Precip mm':  dates.map(d => wxData?.[d]?.precip   ?? null),
  };
  const AQ = {
    'PM2.5':  dates.map(d => aqData?.[d]?.pm2_5 ?? null),
    'PM10':   dates.map(d => aqData?.[d]?.pm10  ?? null),
    'NO₂':    dates.map(d => aqData?.[d]?.no2   ?? null),
    'O₃':     dates.map(d => aqData?.[d]?.o3    ?? null),
    'AQI':    dates.map(d => aqData?.[d]?.aqi   ?? null),
    'UV idx': dates.map(d => aqData?.[d]?.uv    ?? null),
  };
  return { dates, H, WX, AQ };
}

// ── Controls panel (rendered once, sliders mutate state) ─────────
function renderCorrelControls() {
  const total = corrAllData.length;
  const maxH  = Math.max(30, total);
  const curH  = (corrHistory > 0 && corrHistory < total) ? corrHistory : total;

  const bioCov = [
    ['HRV',           corrAllData.filter(d => d.hrv?.lastNight        != null).length],
    ['Sleep',         corrAllData.filter(d => d.sleep?.durationHours  != null).length],
    ['Stress',        corrAllData.filter(d => d.avgStress             != null).length],
    ['Body Battery',  corrAllData.filter(d => d.bodyBattery?.end      != null).length],
    ['Steps',         corrAllData.filter(d => d.steps                 != null).length],
    ['Resting HR',    corrAllData.filter(d => d.restingHR             != null).length],
    ['Training Ready',corrAllData.filter(d => d.trainingReadiness     != null).length],
    ['Endurance',     corrAllData.filter(d => d.enduranceScore        != null).length],
    ['Fitness Age',   corrAllData.filter(d => d.fitnessAge            != null).length],
  ];
  const wxN = corrAllData.filter(d => wxData?.[d.date] != null).length;
  const aqN = corrAllData.filter(d => aqData?.[d.date] != null).length;

  const covBar = (n, col) => {
    const pct = total > 0 ? Math.round(n/total*100) : 0;
    return `<div class="cov-bar-bg"><div class="cov-bar" style="width:${pct}%;background:${col}"></div></div>
            <span class="cov-pct" style="color:${col}">${pct}% (${n}d)</span>`;
  };

  document.getElementById('correlControls').innerHTML = `
    <div class="correl-controls">
      <div class="ctrl-group">
        <div class="ctrl-label">rolling window &nbsp;·&nbsp; <span class="ctrl-val" id="winVal">${corrWindow}</span> days</div>
        <input type="range" class="correl-range" id="winSlider" min="6" max="180" step="1" value="${corrWindow}">
        <div class="ctrl-sublabel">6 days &nbsp;→&nbsp; 6 months</div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">history &nbsp;·&nbsp; <span class="ctrl-val" id="histVal">${curH}</span> days</div>
        <input type="range" class="correl-range" id="histSlider" min="30" max="${maxH}" step="1" value="${curH}">
        <div class="ctrl-sublabel">30 days &nbsp;→&nbsp; all (${total})${total < 60
          ? ' &nbsp;<span class="warn-hint">↑ run workflow sync_days=365</span>' : ''}</div>
      </div>
      <div class="ctrl-group ctrl-coverage">
        <div class="ctrl-label">biometric coverage</div>
        ${bioCov.map(([k, n]) => {
          const pct = total > 0 ? Math.round(n/total*100) : 0;
          const col = pct < 20 ? 'rgba(255,80,80,.9)' : pct < 60 ? 'rgba(255,200,80,.9)' : 'rgba(14,184,255,.9)';
          return `<div class="cov-item"><span class="cov-name">${k}</span>${covBar(n, col)}</div>`;
        }).join('')}
      </div>
      <div class="ctrl-group ctrl-coverage">
        <div class="ctrl-label">environment coverage</div>
        <div class="cov-item"><span class="cov-name" style="color:rgba(14,184,255,.85)">🌤 Weather</span>${covBar(wxN, 'rgba(14,184,255,.9)')}</div>
        <div class="cov-item"><span class="cov-name" style="color:rgba(255,160,40,.9)">🏭 Air Quality</span>${covBar(aqN, 'rgba(255,160,40,.9)')}</div>
      </div>
    </div>`;

  document.getElementById('winSlider').addEventListener('input', function() {
    corrWindow = parseInt(this.value);
    document.getElementById('winVal').textContent = corrWindow;
    refreshCorrelCharts();
  });
  document.getElementById('histSlider').addEventListener('input', function() {
    const v = parseInt(this.value);
    corrHistory = v >= maxH ? 0 : v;
    document.getElementById('histVal').textContent = corrHistory > 0 ? corrHistory : total;
    refreshCorrelCharts();
  });
}

// ── Matrix: 6 biometrics × (4 weather + 6 AQ) ────────────────────
function renderCorrelMatrix() {
  const el = document.getElementById('correlMatrix');
  if (!el) return;
  const data = getCorrelSlice();
  const { dates, H, WX, AQ } = buildHW(data);
  const hKeys  = Object.keys(H);
  const wxKeys = Object.keys(WX);
  const aqKeys = Object.keys(AQ);
  const totalEnvCols = wxKeys.length + aqKeys.length;

  // Compute all r values
  const mat = {};
  hKeys.forEach(hk => {
    mat[hk] = {};
    wxKeys.forEach(wk => { mat[hk][wk] = pearson(H[hk], WX[wk]); });
    aqKeys.forEach(wk => { mat[hk][wk] = pearson(H[hk], AQ[wk]); });
  });

  // Grid template: label col + env cols
  const gtc = `112px repeat(${totalEnvCols}, minmax(82px, 1fr))`;

  el.innerHTML = `
    <div class="chart-title">// pearson r · biometrics vs environment · ${dates.length} days //</div>
    <div class="correl-matrix" style="grid-template-columns:${gtc}">
      <!-- Group header row -->
      <div></div>
      <div class="correl-group-cell correl-group-wx" style="grid-column:span ${wxKeys.length}">🌤 weather</div>
      <div class="correl-group-cell correl-group-aq" style="grid-column:span ${aqKeys.length}">🏭 air quality</div>
      <!-- Column headers -->
      <div></div>
      ${wxKeys.map(wk => `<div class="correl-hdr-cell">${wk}</div>`).join('')}
      ${aqKeys.map(wk => `<div class="correl-hdr-cell correl-hdr-aq">${wk}</div>`).join('')}
      <!-- Data rows -->
      ${hKeys.map(hk => `
        <div class="correl-row-label">${hk}</div>
        ${wxKeys.map(wk => {
          const r = mat[hk][wk];
          return `<div class="correl-cell" style="${corrStyle(r)}" title="${hk} vs ${wk}: r=${r??'n/a'}">${r!=null?r:'n/a'}</div>`;
        }).join('')}
        ${aqKeys.map(wk => {
          const r = mat[hk][wk];
          return `<div class="correl-cell correl-cell-aq" style="${corrStyle(r)}" title="${hk} vs ${wk}: r=${r??'n/a'}">${r!=null?r:'n/a'}</div>`;
        }).join('')}`).join('')}
    </div>
    <div class="correl-legend">
      <span style="color:rgba(255,80,80,.95)">■ negative</span>
      <span style="color:rgba(14,184,255,.5)">■ near zero</span>
      <span style="color:rgba(14,184,255,.98)">■ positive</span>
      <span>&nbsp;· |r| = intensity · open-meteo · vienna 48.24°N</span>
    </div>`;
}

// ── Ranked list + detail chart ────────────────────────────────────
let allPairs      = [];    // [{h, w, r, absR, isAQ}] sorted by absR desc
let activeCatFilter = 'All';
let detailChart   = null;
let selectedPairKey = null;

function rColor(r) {
  if (r == null) return 'rgba(14,184,255,0.35)';
  const a = (0.55 + Math.abs(r) * 0.45).toFixed(2);
  return r >= 0 ? `rgba(14,184,255,${a})` : `rgba(255,80,80,${a})`;
}

function buildPairs(data) {
  const { H, WX, AQ } = buildHW(data);
  const allEnv = { ...WX, ...AQ };
  const pairs = [];
  for (const hk of Object.keys(H)) {
    for (const wk of Object.keys(allEnv)) {
      const r = pearson(H[hk], allEnv[wk]);
      if (r != null) pairs.push({ h:hk, w:wk, r, absR:Math.abs(r), isAQ: wk in AQ });
    }
  }
  pairs.sort((a,b) => b.absR - a.absR);
  return pairs;
}

function renderCorrelList() {
  const listEl = document.getElementById('correlList');
  if (!listEl) return;

  // Determine which biometrics to show
  const catBios = activeCatFilter === 'All' ? null : BIO_CATEGORIES[activeCatFilter];
  const visible = allPairs.filter(p => !catBios || catBios.includes(p.h));

  // Update filter button active state
  document.querySelectorAll('.corr-filter-btn').forEach(btn => {
    btn.classList.toggle('on', btn.dataset.cat === activeCatFilter);
  });
  document.getElementById('corrCount').textContent = `${visible.length} pairs`;

  if (!visible.length) {
    listEl.innerHTML = `<div class="no-data">no data yet — run sync with sync_days=365</div>`;
    return;
  }

  listEl.innerHTML = visible.map((p, i) => {
    const col    = H_COLORS[p.h] || 'rgba(14,184,255,0.85)';
    const rc     = rColor(p.r);
    const barW   = Math.round(p.absR * 100);
    const barCol = p.r >= 0 ? 'rgba(14,184,255,0.7)' : 'rgba(255,80,80,0.7)';
    const key    = `${p.h}||${p.w}`;
    const sel    = key === selectedPairKey ? ' selected' : '';
    return `<div class="corr-row${sel}" data-key="${key}" onclick="selectPair('${p.h.replace(/'/g,"\\'")}','${p.w.replace(/'/g,"\\'")}')">
      <span class="corr-rank">${i+1}</span>
      <span class="corr-bio" style="color:${col}">${p.h}</span>
      <span class="corr-env${p.isAQ?' aq':''}">${p.w}</span>
      <span class="corr-r-val" style="color:${rc}">${p.r >= 0 ? '+' : ''}${p.r.toFixed(3)}</span>
      <div class="corr-bar-col"><div class="corr-bar-bg"><div class="corr-bar" style="width:${barW}%;background:${barCol}"></div></div></div>
    </div>`;
  }).join('');
}

function selectPair(hk, wk) {
  selectedPairKey = `${hk}||${wk}`;
  renderCorrelList();
  renderDetailChart(hk, wk);
}

function renderDetailChart(hk, wk) {
  const panel = document.getElementById('detailPanel');
  if (!panel) return;
  panel.classList.add('visible');

  const data = getCorrelSlice();
  if (data.length < corrWindow + 1) {
    panel.innerHTML = `<div class="no-data">need ${corrWindow+1} days for a ${corrWindow}-day rolling window</div>`;
    return;
  }

  const { dates, H, WX, AQ } = buildHW(data);
  const allEnv = { ...WX, ...AQ };
  const xs = H[hk], ys = allEnv[wk];
  const roll = rollingCorr(dates, xs, ys, corrWindow);
  const overallR = pearson(xs, ys);
  const col = H_COLORS[hk] || 'rgba(14,184,255,0.85)';
  const envCol = (wk in AQ) ? 'rgba(255,160,40,.88)' : 'rgba(14,184,255,.88)';

  panel.innerHTML = `
    <div class="chart-title" style="color:${col}">
      // ${corrWindow}d rolling r · ${hk.toLowerCase()} vs
      <span style="color:${envCol}">${wk.toLowerCase()}</span>
      &nbsp;<span style="opacity:.6;color:#ddeeff">overall r = ${overallR != null ? (overallR>=0?'+':'')+overallR.toFixed(3) : 'n/a'}</span> //
    </div>
    <div class="detail-wrap"><canvas id="detailCanvas"></canvas></div>`;

  if (detailChart) { detailChart.destroy(); detailChart = null; }
  const ctx = document.getElementById('detailCanvas').getContext('2d');
  detailChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: roll.map(r => r.date.slice(5)),
      datasets: [{
        data: roll.map(r => r.r),
        borderColor: col,
        backgroundColor: col.replace('0.85','0.08'),
        borderWidth: 1.5, pointRadius: 1.5, pointBackgroundColor: col,
        fill: true, tension: 0.35, spanGaps: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          ...tooltipStyle(),
          callbacks: { label: ctx => ` r = ${ctx.parsed.y != null ? ctx.parsed.y.toFixed(3) : 'n/a'}` }
        }
      },
      scales: {
        x: { grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:12},maxTicksLimit:10} },
        y: {
          grid:{color:GRID_COLOR}, min:-1, max:1,
          afterBuildTicks: ax => { ax.ticks=[-1,-0.5,0,0.5,1].map(v=>({value:v})); },
          ticks:{ color:TICK_COLOR, font:{family:'Share Tech Mono',size:12}, callback:v=>v.toFixed(1) },
        },
      }
    }
  });
}

function refreshCorrelCharts() {
  const data = getCorrelSlice();
  allPairs = buildPairs(data);
  renderCorrelMatrix();
  renderCorrelList();
  if (selectedPairKey) {
    const [hk, wk] = selectedPairKey.split('||');
    renderDetailChart(hk, wk);
  }
}

// ── Entry point ───────────────────────────────────────────────────
async function loadAndRenderCorrelations(rawDocs) {
  corrAllData = rawDocs.filter(d => d.date).sort((a,b) => a.date.localeCompare(b.date));
  const statusEl = document.getElementById('correlStatus');
  if (!corrAllData.length) { statusEl.textContent = 'no garmin data yet'; return; }

  const startDate = corrAllData[0].date;
  statusEl.textContent = `fetching environment data for ${corrAllData.length} days...`;

  try {
    [wxData, aqData] = await Promise.all([
      fetchWeatherArchive(startDate),
      fetchAirQualityArchive(startDate),
    ]);
  } catch(e) {
    statusEl.textContent = 'environment data unavailable — ' + e.message;
    return;
  }

  // Build initial pairs
  allPairs = buildPairs(getCorrelSlice());

  // Build category filter buttons
  const cats = ['All', ...Object.keys(BIO_CATEGORIES)];
  const filterBtns = cats.map(c =>
    `<button class="corr-filter-btn${c==='All'?' on':''}" data-cat="${c}"
       onclick="activeCatFilter='${c}';renderCorrelList()">${c}</button>`
  ).join('');

  document.getElementById('correlGrid').innerHTML = `
    <div class="chart-panel" id="correlListPanel">
      <div class="chart-title">// correlation ranking · all biometrics vs environment //</div>
      <div class="corr-filters">
        ${filterBtns}
        <span class="corr-count" id="corrCount"></span>
      </div>
      <div class="corr-list-hdr">
        <span>#</span><span>biometric</span><span>environment</span><span style="text-align:right">r</span><span>strength</span>
      </div>
      <div id="correlList"></div>
    </div>

    <div class="detail-panel" id="detailPanel"></div>

    <div class="chart-panel" id="correlMatrix" style="display:none"></div>

    <button class="matrix-toggle" onclick="
      const m=document.getElementById('correlMatrix');
      const vis=m.style.display!=='none';
      m.style.display=vis?'none':'block';
      this.textContent=vis?'▶ show correlation matrix':'▼ hide matrix';
      if(!vis) renderCorrelMatrix();">▶ show correlation matrix</button>`;

  renderCorrelControls();
  renderCorrelList();

  const wxN = Object.keys(wxData).filter(d => d >= startDate).length;
  const aqN = Object.keys(aqData).filter(d => d >= startDate).length;
  statusEl.textContent = `open-meteo · ${corrAllData.length} garmin · ${wxN} weather · ${aqN} AQ days · vienna 48.24°N · click any row to see rolling chart`;
}



// Fetch custom var definitions first, then load correlations
db.collection('_config').doc('custom_vars').get().then(snap => {
  customVarDefs = (snap.exists && snap.data().vars) ? snap.data().vars : [];
}).catch(() => {}).finally(() => {
  col.orderBy('date', 'asc').onSnapshot(snap => {
    const docs = snap.docs.map(d => d.data());
    document.getElementById('pgStatus').textContent = docs.length + ' days of garmin data loaded'
      + (customVarDefs.length ? ` · ${customVarDefs.length} custom vars` : '');
    loadAndRenderCorrelations(docs);
  }, err => {
    document.getElementById('pgStatus').textContent = 'error: ' + err.message;
  });
});
</script>
