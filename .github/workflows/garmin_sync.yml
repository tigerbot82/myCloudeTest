name: Garmin → Firestore Sync

on:
  schedule:
    # runs every day at 07:00 UTC — adjust to your timezone
    - cron: '0 7 * * *'
  workflow_dispatch:
    # also lets you trigger it manually from the GitHub Actions tab
    inputs:
      sync_days:
        description: 'Number of past days to sync (default 7)'
        required: false
        default: '7'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r sync/requirements.txt

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL:               ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:            ${{ secrets.GARMIN_PASSWORD }}
          FIREBASE_CREDENTIALS_JSON:  ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          SYNC_DAYS:                  ${{ github.event.inputs.sync_days || '7' }}
        run: python sync/garmin_sync.py
