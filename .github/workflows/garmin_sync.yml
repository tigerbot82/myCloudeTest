name: Garmin → Firestore Sync

on:
  schedule:
    # runs every day at 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      mfa_code:
        description: 'MFA code from Garmin email (only needed when Garmin asks for it)'
        required: false
        default: ''
      sync_days:
        description: 'Number of past days to sync (default 7)'
        required: false
        default: '7'
      debug:
        description: 'Print raw Garmin API responses (1=yes, leave blank=no)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r sync/requirements.txt

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL:               ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:            ${{ secrets.GARMIN_PASSWORD }}
          FIREBASE_CREDENTIALS_JSON:  ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          GARMIN_TOTP_SECRET:         ${{ secrets.GARMIN_TOTP_SECRET }}
          GARMIN_TOKENS:              ${{ secrets.GARMIN_TOKENS }}
          GARMIN_MFA_CODE:            ${{ github.event.inputs.mfa_code || '' }}
          SYNC_DAYS:                  ${{ github.event.inputs.sync_days || '7' }}
          SYNC_DEBUG:                 ${{ github.event.inputs.debug || '' }}
        run: python sync/garmin_sync.py
