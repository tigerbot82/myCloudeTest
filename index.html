<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      color: white;
    }

    canvas#bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    h1 {
      text-align: center;
      font-size: 2em;
      letter-spacing: 0.06em;
      text-shadow: 0 0 20px rgba(255,255,255,0.7), 0 0 40px rgba(200,100,255,0.5);
    }

    /* ── Glass panel ── */
    .panel {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 0 32px rgba(160,80,255,0.15);
    }

    .panel h2 {
      font-size: 0.8em;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }

    /* ── Category buttons ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }

    .cat-btn {
      padding: 14px 10px;
      font-size: 0.92em;
      font-weight: 600;
      cursor: pointer;
      border-radius: 12px;
      border: 2px solid transparent;
      transition: transform 0.1s, box-shadow 0.2s, border-color 0.2s;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      background: rgba(255,255,255,0.08);
    }

    .cat-btn:hover  { transform: scale(1.04); }
    .cat-btn:active { transform: scale(0.97); }

    .cat-btn.active {
      border-color: white;
      box-shadow: 0 0 18px 4px var(--glow);
      background: var(--bg);
    }

    .cat-btn[data-cat="focused"]   { --bg: rgba(80,160,255,0.3);  --glow: rgba(80,160,255,0.6); }
    .cat-btn[data-cat="directs"]   { --bg: rgba(160,80,255,0.3);  --glow: rgba(160,80,255,0.6); }
    .cat-btn[data-cat="peers"]     { --bg: rgba(255,140,60,0.3);  --glow: rgba(255,140,60,0.6); }
    .cat-btn[data-cat="email"]     { --bg: rgba(80,220,160,0.3);  --glow: rgba(80,220,160,0.6); }
    .cat-btn[data-cat="personal"]  { --bg: rgba(255,80,140,0.3);  --glow: rgba(255,80,140,0.6); }
    .cat-btn[data-cat="finish"]    { --bg: rgba(255,220,60,0.25); --glow: rgba(255,220,60,0.5); color: #ffe87a; }

    /* ── Active timer ── */
    #active-display {
      text-align: center;
      font-size: 1em;
      color: rgba(255,255,255,0.75);
      min-height: 1.4em;
    }

    #active-display strong { color: white; }
    #active-display .timer { font-variant-numeric: tabular-nums; font-size: 1.1em; }

    /* ── Table ── */
    .table-wrap {
      max-height: 260px;
      overflow-y: auto;
      border-radius: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88em;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(20,0,40,0.85);
      padding: 9px 12px;
      text-align: left;
      font-size: 0.78em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      backdrop-filter: blur(8px);
    }

    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
    tbody tr:hover { background: rgba(255,255,255,0.05); }

    tbody td {
      padding: 9px 12px;
      color: rgba(255,255,255,0.85);
    }

    .dot {
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      margin-right: 7px;
      vertical-align: middle;
    }

    .no-entries {
      text-align: center;
      padding: 24px;
      color: rgba(255,255,255,0.35);
      font-size: 0.9em;
    }

    /* ── Bar chart ── */
    .chart-wrap { position: relative; }

    canvas#chart {
      width: 100%;
      border-radius: 10px;
    }

    /* ── Filter pills ── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .filter-btn {
      padding: 5px 14px;
      font-size: 0.78em;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.55);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .filter-btn:hover { background: rgba(255,255,255,0.12); color: white; }

    .filter-btn.active {
      background: rgba(200,120,255,0.3);
      border-color: rgba(200,120,255,0.7);
      color: white;
      box-shadow: 0 0 10px rgba(200,120,255,0.3);
    }

    .chart-subtitle {
      text-align: center;
      font-size: 0.78em;
      color: rgba(255,255,255,0.3);
      margin-top: 8px;
    }

    /* ── Clear button ── */
    .clear-btn {
      align-self: flex-end;
      background: rgba(255,60,60,0.15);
      border: 1px solid rgba(255,60,60,0.3);
      color: rgba(255,150,150,0.9);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.8em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: rgba(255,60,60,0.28); }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="page">
  <h1>Time Tracker</h1>

  <!-- Buttons -->
  <div class="panel">
    <h2>What are you working on?</h2>
    <div class="btn-grid">
      <button class="cat-btn" data-cat="focused"  onclick="startCategory('focused')">🎯 Focused Work</button>
      <button class="cat-btn" data-cat="directs"  onclick="startCategory('directs')">👥 1:1 with Directs</button>
      <button class="cat-btn" data-cat="peers"    onclick="startCategory('peers')">🤝 1:1 with Peers</button>
      <button class="cat-btn" data-cat="email"    onclick="startCategory('email')">📧 Email Processing</button>
      <button class="cat-btn" data-cat="personal" onclick="startCategory('personal')">🌿 Personal</button>
      <button class="cat-btn" data-cat="finish"   onclick="finishDay()">✅ Finish Day</button>
    </div>
    <div style="margin-top:16px">
      <div id="active-display">No active session</div>
    </div>
  </div>

  <!-- Log table -->
  <div class="panel">
    <h2>Time Log</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Category</th>
            <th>Started</th>
            <th>Ended</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="4" class="no-entries">No entries yet — start a session above.</td></tr>
        </tbody>
      </table>
    </div>
    <div style="margin-top:12px; display:flex; justify-content:flex-end;">
      <button class="clear-btn" onclick="clearData()">Clear all data</button>
    </div>
  </div>

  <!-- Bar chart -->
  <div class="panel">
    <h2>Time by Category</h2>
    <div class="filter-row" id="filter-row">
      <button class="filter-btn active" data-filter="today"    onclick="setFilter('today')">Today</button>
      <button class="filter-btn"        data-filter="week"     onclick="setFilter('week')">This Week</button>
      <button class="filter-btn"        data-filter="month"    onclick="setFilter('month')">This Month</button>
      <button class="filter-btn"        data-filter="prevmonth" onclick="setFilter('prevmonth')">Prev Month</button>
      <button class="filter-btn"        data-filter="year"     onclick="setFilter('year')">This Year</button>
      <button class="filter-btn"        data-filter="all"      onclick="setFilter('all')">All Time</button>
    </div>
    <div class="chart-wrap">
      <canvas id="chart" height="220"></canvas>
    </div>
    <div class="chart-subtitle" id="chart-subtitle"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  Category config
// ─────────────────────────────────────────────
const CATS = {
  focused:  { label: 'Focused Work',      color: 'rgba(80,160,255,0.85)' },
  directs:  { label: '1:1 with Directs',  color: 'rgba(160,80,255,0.85)' },
  peers:    { label: '1:1 with Peers',    color: 'rgba(255,140,60,0.85)' },
  email:    { label: 'Email Processing',  color: 'rgba(80,220,160,0.85)' },
  personal: { label: 'Personal',          color: 'rgba(255,80,140,0.85)' },
};

// ─────────────────────────────────────────────
//  Data layer (localStorage)
// ─────────────────────────────────────────────
const STORE_KEY = 'timetracker_v1';

function loadEntries() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}

function saveEntries(entries) {
  localStorage.setItem(STORE_KEY, JSON.stringify(entries));
}

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let entries = loadEntries();
let tickInterval = null;
let chartFilter = 'today';

// ─────────────────────────────────────────────
//  Filter helpers
// ─────────────────────────────────────────────
function getFilterRange(filter) {
  const now = new Date();
  const sod = d => new Date(d.getFullYear(), d.getMonth(), d.getDate()); // start of day

  switch (filter) {
    case 'today': {
      const start = sod(now);
      const end   = new Date(start.getTime() + 86400000);
      return { start, end, label: 'Today · ' + now.toLocaleDateString([], { weekday:'long', month:'short', day:'numeric' }) };
    }
    case 'week': {
      const dow   = now.getDay(); // 0=Sun
      const start = sod(new Date(now.getFullYear(), now.getMonth(), now.getDate() - dow));
      const end   = new Date(start.getTime() + 7 * 86400000);
      return { start, end, label: 'This Week · ' + start.toLocaleDateString([], { month:'short', day:'numeric' }) + ' – ' + new Date(end - 1).toLocaleDateString([], { month:'short', day:'numeric' }) };
    }
    case 'month': {
      const start = new Date(now.getFullYear(), now.getMonth(), 1);
      const end   = new Date(now.getFullYear(), now.getMonth() + 1, 1);
      return { start, end, label: 'This Month · ' + now.toLocaleDateString([], { month:'long', year:'numeric' }) };
    }
    case 'prevmonth': {
      const start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const end   = new Date(now.getFullYear(), now.getMonth(), 1);
      return { start, end, label: 'Previous Month · ' + start.toLocaleDateString([], { month:'long', year:'numeric' }) };
    }
    case 'year': {
      const start = new Date(now.getFullYear(), 0, 1);
      const end   = new Date(now.getFullYear() + 1, 0, 1);
      return { start, end, label: 'This Year · ' + now.getFullYear() };
    }
    default: // 'all'
      return { start: new Date(0), end: new Date(8640000000000000), label: 'All Time' };
  }
}

function filteredEntries() {
  const { start, end } = getFilterRange(chartFilter);
  return entries.filter(e => {
    const s = new Date(e.start);
    return s >= start && s < end;
  });
}

function setFilter(f) {
  chartFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === f)
  );
  renderChart();
}

function activeEntry() {
  return entries.find(e => e.end === null) || null;
}

// ─────────────────────────────────────────────
//  Actions
// ─────────────────────────────────────────────
function startCategory(cat) {
  const now = new Date().toISOString();
  // Close current open entry
  const active = activeEntry();
  if (active) {
    active.end = now;
    active.duration = new Date(now) - new Date(active.start);
  }
  // Open new entry
  entries.push({ id: Date.now(), category: cat, start: now, end: null, duration: null });
  saveEntries(entries);
  render();
}

function finishDay() {
  const active = activeEntry();
  if (active) {
    const now = new Date().toISOString();
    active.end = now;
    active.duration = new Date(now) - new Date(active.start);
    saveEntries(entries);
  }
  render();
}

function clearData() {
  if (!confirm('Clear all time tracking data?')) return;
  entries = [];
  saveEntries(entries);
  render();
}

// ─────────────────────────────────────────────
//  Formatting helpers
// ─────────────────────────────────────────────
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return '';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ';
}

function fmtDuration(ms) {
  if (ms === null || ms === undefined) return '—';
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  if (m > 0) return `${m}m ${String(s).padStart(2,'0')}s`;
  return `${s}s`;
}

function elapsedMs(entry) {
  return entry.end
    ? entry.duration
    : (Date.now() - new Date(entry.start));
}

// ─────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────
function render() {
  renderActiveDisplay();
  renderTable();
  renderChart();
  renderButtonStates();

  clearInterval(tickInterval);
  if (activeEntry()) {
    tickInterval = setInterval(() => {
      renderActiveDisplay();
      renderTable();
      renderChart();
    }, 1000);
  }
}

function renderButtonStates() {
  const active = activeEntry();
  document.querySelectorAll('.cat-btn[data-cat]').forEach(btn => {
    btn.classList.toggle('active', active && btn.dataset.cat === active.category);
  });
}

function renderActiveDisplay() {
  const el = document.getElementById('active-display');
  const active = activeEntry();
  if (!active) {
    el.innerHTML = 'No active session';
    return;
  }
  const cfg = CATS[active.category];
  const elapsed = fmtDuration(Date.now() - new Date(active.start));
  el.innerHTML = `<strong style="color:${cfg.color}">${cfg.label}</strong> &nbsp;·&nbsp; <span class="timer">${elapsed}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('log-body');
  if (entries.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="no-entries">No entries yet — start a session above.</td></tr>';
    return;
  }

  // Show newest first
  const sorted = [...entries].reverse();
  tbody.innerHTML = sorted.map(e => {
    const cfg = CATS[e.category];
    const isActive = e.end === null;
    const dur = isActive
      ? `<span style="color:${cfg.color}">${fmtDuration(Date.now() - new Date(e.start))} ●</span>`
      : fmtDuration(e.duration);
    return `<tr>
      <td><span class="dot" style="background:${cfg.color}"></span>${cfg.label}</td>
      <td>${fmtDate(e.start)}${fmtTime(e.start)}</td>
      <td>${isActive ? '<em style="opacity:.4">ongoing</em>' : fmtDate(e.end) + fmtTime(e.end)}</td>
      <td>${dur}</td>
    </tr>`;
  }).join('');
}

function renderChart() {
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth;
  const H = 220;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Aggregate totals for current filter
  const { label: filterLabel } = getFilterRange(chartFilter);
  document.getElementById('chart-subtitle').textContent = filterLabel;

  const totals = {};
  Object.keys(CATS).forEach(k => totals[k] = 0);
  filteredEntries().forEach(e => { totals[e.category] += elapsedMs(e); });

  const keys = Object.keys(CATS);
  const maxMs = Math.max(...keys.map(k => totals[k]), 1);

  const padL = 54, padR = 16, padT = 16, padB = 36;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const barW = Math.floor(chartW / keys.length) - 10;
  const barGap = (chartW - barW * keys.length) / (keys.length + 1);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padT + chartH - (i / 4) * chartH;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + chartW, y); ctx.stroke();
    // Y label
    const ms = (i / 4) * maxMs;
    const label = ms >= 3600000
      ? (ms / 3600000).toFixed(1) + 'h'
      : Math.round(ms / 60000) + 'm';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = `${10 * dpr / dpr}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(label, padL - 6, y + 4);
  }

  // Bars
  keys.forEach((key, i) => {
    const cfg = CATS[key];
    const val = totals[key];
    const barH = val === 0 ? 2 : Math.max(2, (val / maxMs) * chartH);
    const x = padL + barGap + i * (barW + barGap);
    const y = padT + chartH - barH;

    // Bar glow
    const grad = ctx.createLinearGradient(0, y, 0, y + barH);
    grad.addColorStop(0, cfg.color);
    grad.addColorStop(1, cfg.color.replace('0.85', '0.3'));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
    ctx.fill();

    // Value label on top
    if (val > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = `bold 11px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(fmtDuration(val), x + barW / 2, y - 5);
    }

    // X label
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `10px sans-serif`;
    ctx.textAlign = 'center';
    const shortLabel = cfg.label.length > 10 ? cfg.label.split(' ').slice(-1)[0] : cfg.label;
    ctx.fillText(shortLabel, x + barW / 2, padT + chartH + 20);
  });
}

// ─────────────────────────────────────────────
//  Psychedelic background
// ─────────────────────────────────────────────
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
let t = 0;

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', () => { resizeBg(); renderChart(); });

function drawBg() {
  const W = bgCanvas.width, H = bgCanvas.height;
  bgCtx.fillStyle = '#000';
  bgCtx.fillRect(0, 0, W, H);

  const imageData = bgCtx.createImageData(W, H);
  const data = imageData.data;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const nx = x / W, ny = y / H;
      const v = (
        Math.sin(nx * 10 + t) +
        Math.sin(ny * 10 + t * 1.3) +
        Math.sin((nx + ny) * 8 + t * 0.7) +
        Math.sin(Math.sqrt((nx-.5)**2 + (ny-.5)**2) * 20 - t * 1.5)
      ) / 4;

      const hue = ((v + 1) / 2 * 360 + t * 40) % 360;
      const s = (90 + Math.sin(t + v * 5) * 10) / 100;
      const l = (45 + Math.sin(t * 0.7 + v * 3) * 15) / 100;
      const c = (1 - Math.abs(2*l - 1)) * s;
      const h = hue / 60;
      const xc = c * (1 - Math.abs(h % 2 - 1));
      const m = l - c/2;
      let r, g, b;
      if (h<1){r=c;g=xc;b=0}else if(h<2){r=xc;g=c;b=0}
      else if(h<3){r=0;g=c;b=xc}else if(h<4){r=0;g=xc;b=c}
      else if(h<5){r=xc;g=0;b=c}else{r=c;g=0;b=xc}

      const idx = (y * W + x) * 4;
      data[idx]=(r+m)*255; data[idx+1]=(g+m)*255; data[idx+2]=(b+m)*255; data[idx+3]=255;
    }
  }
  bgCtx.putImageData(imageData, 0, 0);

  const cx = W/2, cy = H/2;
  for (let i = 0; i < 6; i++) {
    const phase = t * (0.5 + i * 0.15) + i * Math.PI / 3;
    const radius = 100 + i * 60 + Math.sin(t * 0.8 + i) * 40;
    const ox = cx + Math.cos(phase * 0.4) * 80;
    const oy = cy + Math.sin(phase * 0.3) * 60;
    const grad = bgCtx.createRadialGradient(ox, oy, 0, ox, oy, radius);
    const hue = (t * 60 + i * 60) % 360;
    grad.addColorStop(0,   `hsla(${hue},100%,70%,0.15)`);
    grad.addColorStop(0.5, `hsla(${(hue+120)%360},100%,60%,0.08)`);
    grad.addColorStop(1,   `hsla(${(hue+240)%360},100%,50%,0)`);
    bgCtx.fillStyle = grad;
    bgCtx.beginPath();
    bgCtx.arc(ox, oy, radius, 0, Math.PI * 2);
    bgCtx.fill();
  }

  t += 0.012;
  requestAnimationFrame(drawBg);
}

drawBg();

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
render();
</script>
</body>
</html>
