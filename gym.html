let currentWorkout = 'A';
let allSessions    = [];
let prevSession    = null;
let flagState      = {};   // exId → selected flag key
let charts         = {};

const GRID_COLOR = 'rgba(14,184,255,0.1)';
const TICK_COLOR = 'rgba(220,240,255,0.95)';

// ── Init ─────────────────────────────────────────────────────────
document.getElementById('sessionDate').value = new Date().toISOString().slice(0,10);

gymCol.orderBy('date','asc').onSnapshot(snap => {
  allSessions = snap.docs.map(d => d.data()).filter(d => d.date);
  document.getElementById('pgStatus').textContent =
    allSessions.length + ' sessions logged';
  detectNextWorkout();
  renderForm();
  renderCharts();
}, err => {
  document.getElementById('pgStatus').textContent = 'error: ' + err.message;
});

function detectNextWorkout() {
  if (!allSessions.length) return;
  const last = allSessions[allSessions.length - 1];
  const next = last.workout === 'A' ? 'B' : 'A';
  selectWorkout(next, false);
  // update subtitle
  const daysAgo = Math.round((Date.now() - new Date(last.date)) / 86400000);
  document.getElementById('gymSubtitle').textContent =
    `last: ${last.workout} on ${last.date} (${daysAgo}d ago) · next: ${next}`;
}

function selectWorkout(w, renderNow = true) {
  currentWorkout = w;
  flagState = {};
  document.getElementById('btnA').className = 'wt-btn' + (w==='A' ? ' active-a' : '');
  document.getElementById('btnB').className = 'wt-btn' + (w==='B' ? ' active-b' : '');
  document.getElementById('workoutBadge').textContent = w;
  document.getElementById('workoutBadge').className = 'workout-badge' + (w==='B' ? ' b' : '');
  // find previous session of this workout type
  prevSession = [...allSessions].reverse().find(s => s.workout === w) || null;
  if (renderNow) renderForm();
}

function renderForm() {
  const exs = WORKOUTS[currentWorkout].exercises;
  document.getElementById('exGrid').innerHTML = exs.map(ex => {
    const prev  = prevSession?.exercises?.[ex.id];
    const prevTxt = prev
      ? `${prev.s}×${prev.r}×${prev.w}${ex.bilateral?' /hand':''}${prev.f?' '+prev.f:''}`
      : 'no history';
    const flagBtns = FLAGS.map(fl => {
      const sel = flagState[ex.id] === fl.key;
      return `<button class="flag-btn${sel?' sel '+fl.cls:''}" onclick="toggleFlag('${ex.id}','${fl.key}',this)">${fl.label}</button>`;
    }).join('');
    return `
    <div class="ex-card">
      <div class="ex-header">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-prev">prev: ${prevTxt}</div>
      </div>
      <div class="ex-inputs">
        <div class="ex-field"><div class="ex-lbl">sets</div>
          <input class="ex-inp" id="${ex.id}_s" type="number" min="1" step="1"
            value="${prev?.s ?? 3}" placeholder="3"></div>
        <div class="ex-field"><div class="ex-lbl">reps</div>
          <input class="ex-inp" id="${ex.id}_r" type="number" min="1" step="1"
            value="${prev?.r ?? 12}" placeholder="12"></div>
        <div class="ex-field"><div class="ex-lbl">weight</div>
          <input class="ex-inp wide" id="${ex.id}_w" type="number" min="0" step="2.5"
            value="${prev?.w ?? ''}" placeholder="—"></div>
        <div class="ex-unit">${ex.unit}</div>
      </div>
      <div class="flag-row">${flagBtns}</div>
      <textarea class="ex-notes" id="${ex.id}_n" rows="1" placeholder="notes..."></textarea>
    </div>`;
  }).join('');
}

function toggleFlag(exId, key, btn) {
  const already = flagState[exId] === key;
  flagState[exId] = already ? null : key;
  renderForm();   // re-render to update button states
}

function saveSession() {
  const date = document.getElementById('sessionDate').value;
  if (!date) { setSaveStatus('pick a date first'); return; }
  const exs = WORKOUTS[currentWorkout].exercises;
  const exercises = {};
  exs.forEach(ex => {
    const s = parseFloat(document.getElementById(ex.id+'_s').value);
    const r = parseFloat(document.getElementById(ex.id+'_r').value);
    const w = parseFloat(document.getElementById(ex.id+'_w').value);
    const n = document.getElementById(ex.id+'_n').value.trim();
    const f = flagState[ex.id] || '';
    if (!isNaN(s) && !isNaN(r)) {
      exercises[ex.id] = { s, r, w: isNaN(w) ? 0 : w, f, n };
    }
  });
  const doc = {
    date, workout: currentWorkout,
    exercises,
    notes: document.getElementById('sessionNotes').value.trim(),
    syncedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  setSaveStatus('saving...');
  gymCol.doc(date).set(doc).then(() => {
    setSaveStatus('✓ saved ' + date);
    document.getElementById('sessionNotes').value = '';
    flagState = {};
  }).catch(e => setSaveStatus('error: ' + e.message));
}

function setSaveStatus(msg) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.textContent = '', 5000);
}

async function seedHistorical() {
  const btn = document.getElementById('btnSeed');
  btn.textContent = 'seeding...';
  btn.disabled = true;
  let count = 0;
  const batch = db.batch();
  for (const s of [...SEED_A, ...SEED_B]) {
    const ref = gymCol.doc(s.date);
    const snap = await ref.get();
    if (!snap.exists) {
      const workout = SEED_A.includes(s) ? 'A' : 'B';
      batch.set(ref, { date: s.date, workout, exercises: s.exercises, notes: s.notes,
        syncedAt: firebase.firestore.FieldValue.serverTimestamp() });
      count++;
    }
  }
  await batch.commit();
  btn.textContent = count ? `✓ imported ${count} sessions` : '✓ already up to date';
  setTimeout(() => { btn.textContent = 'import PDF history'; btn.disabled = false; }, 4000);
}

function renderCharts() {
  const all = [...WORKOUTS.A.exercises, ...WORKOUTS.B.exercises];
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  const grid = document.getElementById('chartGrid');
  grid.innerHTML = all.map(ex => `
    <div class="chart-panel">
      <div class="chart-title">${ex.name}</div>
      <div class="chart-wrap"><canvas id="gc-${ex.id}"></canvas></div>
    </div>`).join('');

  all.forEach(ex => {
    const sessions = allSessions
      .filter(s => s.exercises?.[ex.id]?.w > 0)
      .sort((a,b) => a.date.localeCompare(b.date));
    if (!sessions.length) return;
    const labels = sessions.map(s => s.date.slice(5));
    const weights = sessions.map(s => s.exercises[ex.id].w);
    const flags   = sessions.map(s => s.exercises[ex.id].f || '');
    const ptColors = flags.map(f =>
      ['++','!!','+','!'].includes(f) ? 'rgba(80,220,160,0.9)' :
      ['--','-'].includes(f)          ? 'rgba(255,80,80,0.85)' :
      f === 'injured'                 ? 'rgba(255,200,80,0.9)' :
                                        'rgba(14,184,255,0.85)');
    const ctx = document.getElementById('gc-'+ex.id);
    if (!ctx) return;
    charts[ex.id] = new Chart(ctx.getContext('2d'), {
      type: 'line',
      data: { labels, datasets: [{
        data: weights,
        borderColor: 'rgba(14,184,255,0.5)',
        backgroundColor: 'rgba(14,184,255,0.06)',
        pointBackgroundColor: ptColors,
        pointRadius: 5,
        pointHoverRadius: 7,
        borderWidth: 1.5,
        fill: true, tension: 0.3, spanGaps: true,
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor:'rgba(4,6,18,0.97)',
            borderColor:'rgba(14,184,255,0.45)', borderWidth:1,
            titleColor:'#0eb8ff', bodyColor:'rgba(200,230,255,0.82)',
            titleFont:{family:'Share Tech Mono'}, bodyFont:{family:'Share Tech Mono'},
            callbacks: {
              label: ctx => {
                const s = sessions[ctx.dataIndex];
                const ex2 = s.exercises[ex.id];
                return `${ex2.s}×${ex2.r}×${ex2.w}kg  ${ex2.f||''}`;
              },
              afterLabel: ctx => {
                const s = sessions[ctx.dataIndex];
                return s.notes ? s.notes.slice(0,60) : '';
              }
            }
          }
        },
        scales: {
          x:{ grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:12},maxRotation:45} },
          y:{ grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:12}}, beginAtZero:false }
        }
      }
    });
  });
}
