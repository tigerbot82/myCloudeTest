<script>
const BOOKS = [
{year:2025,title:"Siblings Without Rivalry",author:"Adele Faber & Elaine Mazlish",rating:3,status:"finished",tags:["parenting"],comment:"Really good.",notes:"1. Don't compare siblings. 2. Treat them individually. 3. Acknowledge feelings before solving. 4. Describe problems without taking sides. 5. Coach instead of referee. 6. Stop labeling children. 7. Encourage cooperation not competition. 8. Jealousy is normal \u2014 address with empathy. 9. Intervene only as much as necessary."},{year:2025,title:"A New Earth: Awakening Your Life's Purpose",author:"Eckhart Tolle",rating:3,status:"finished",tags:["mindfulness"],comment:"A little repetitive after The Power of Now.",notes:"1. Most suffering comes from identifying with thoughts. 2. The ego is a false identity built from roles. 3. The pain-body is old emotion that activates under stress. 4. Presence dissolves ego reaction. 5. Watch thoughts instead of believing them. 6. Don't identify with roles. 7. Accept the present moment as it is."},{year:2025,title:"The Power of Now",author:"Eckhart Tolle",rating:5,status:"finished",tags:["mindfulness"],comment:"I have not had a book that had such a profound intellectual effect on me. Comparable to the peace of a 10-day silent retreat, reached by purely logical tools. Heals depression.",notes:"1. Most suffering comes from past and future thinking. 2. The present moment is the only real place life happens. 3. You are not your thoughts \u2014 you can observe them. 4. The pain-body is old emotional baggage. 5. Acceptance stops internal resistance. 6. Use clock time for practical tasks, not rumination. 7. Shift attention to your inner body to return to presence. 8. In relationships, presence breaks the trigger-reaction cycle."},{year:2025,title:"How to Talk So Little Kids Will Listen",author:"Joanna Faber & Julie King",rating:0,status:"",tags:["parenting"],comment:"",notes:"Acknowledge feelings and empathize before correcting. Write it down to acknowledge. Give in fantasy what you cannot give in reality. Keep it playful. Name the issue, not the behaviour. Give descriptive praises not generic ones. Avoid labels. Give choices, engage in cooperation rather than command. Brainstorm solutions together."},{year:2025,title:"Fierce Intimacy",author:"Terrence Real",rating:4,status:"finished",tags:["parenting", "psychology"],comment:"Very practical, no nonsense approach to relationships.",notes:"Recognize your adaptive child. Relationship grid: one-up (grandiosity) vs one-down (shame). Avoid 5 losing strategies: being right, controlling partner, unbridled self-expression, retaliation, withdrawal. Implement 5 winning strategies: complaint to request, listening with compassion, empowering, cherishing. Repair is more important than harmony."},{year:2025,title:"Good Inside",author:"Becky Kennedy",rating:0,status:"",tags:["parenting"],comment:"",notes:""},{year:2025,title:"Getting the Love You Want",author:"Harville Hendrix & Helen LaKelly Hunt",rating:0,status:"",tags:["parenting", "psychology"],comment:"",notes:""},{year:2025,title:"The Anxious Generation",author:"Jonathan Haidt",rating:0,status:"",tags:["history/society", "parenting"],comment:"",notes:""},{year:2025,title:"Secrets of Sand Hill Road",author:"Scott Kupor",rating:0,status:"",tags:["tech/product", "investing"],comment:"",notes:""},{year:2025,title:"Jhana Consciousness",author:"Paul Dennison",rating:0,status:"",tags:["mindfulness"],comment:"",notes:""},{year:2024,title:"Outlive: The Science and Art of Longevity",author:"Peter Attia MD",rating:0,status:"",tags:["science/health"],comment:"",notes:"Medicine 1.0: observations. Medicine 2.0: evidence-based but treats not prevents. Medicine 3.0: preventive, personalized, digital. Rapamycin targets mTOR \u2014 first drug to increase mammal lifespan ~10%. Centenarians age slower, markers 10-20 years behind even without healthy lifestyle. APOB more predictive than LDL for cardiovascular risk."},{year:2024,title:"The Awakened Family",author:"Shefali Tsabary PhD",rating:0,status:"",tags:["parenting"],comment:"",notes:"Parents and children primarily have a time zone issue \u2014 parents live in the future, kids want to focus on the moment. Parents need to recognize we should not try to fix children; parents need to grow more than the kids."},{year:2024,title:"Nexus: A Brief History of Information Networks",author:"",rating:0,status:"",tags:["history/society"],comment:"",notes:""},{year:2024,title:"The Singularity Is Nearer",author:"Ray Kurzweil",rating:0,status:"",tags:["tech/product", "science/health"],comment:"",notes:""},{year:2024,title:"The Power Law: Venture Capital",author:"Sebastian Mallaby",rating:0,status:"",tags:["investing", "tech/product"],comment:"",notes:""},{year:2023,title:"Elon Musk: Tesla, SpaceX, and the Quest for a Fantastic Future",author:"Ashlee Vance",rating:4,status:"finished",tags:["tech/product"],comment:"One of the best biographies I have ever read, more analytical than chronical, super inspiring.",notes:"Die-hard work ethic to everything he was interested in. Sets epic schedules and expects hourly plans. Makes huge decisions alone and fast. Tesla Model S around 2012 was selected best car of the year in front of all other types. Companies built not on a business model but a world view to attract the best talent. Musk is the ultimate long-term thinker."},{year:2023,title:"The Permanent Portfolio",author:"Craig Rowland",rating:4,status:"finished",tags:["investing"],comment:"Really good introductory lesson about portfolio theory in practice, and an incredibly simple but effective way to implement it.",notes:"Rules of Harry Browne: nobody can predict the future, market timing is impossible, no leverage, no third party managing your money, bulletproof portfolio for every economic environment. 4 basic economic environments: prosperity, deflation, recession, inflation. Hold 25% stocks, 25% gold, 25% long bonds, 25% cash."},{year:2023,title:"The Montessori Toddler",author:"Simone Davies",rating:3,status:"finished",tags:["parenting"],comment:"Tons of good anecdotal examples with a rather simple theory.",notes:"Don't test the kids unless you know they can answer \u2014 it's discouraging. Follow the child, encourage hands-on learning, involve in daily activities. Cultivate internal motivation instead of external praises. Avoid threats, bribes and punishment."},{year:2023,title:"Trillion Dollar Coach",author:"Eric Schmidt, Jonathan Rosenberg & Alan Eagle",rating:0,status:"finished",tags:["tech/product"],comment:"",notes:""},{year:2023,title:"The Hard Thing About Hard Things",author:"Ben Horowitz",rating:0,status:"reading",tags:["tech/product"],comment:"",notes:""},{year:2022,title:"Lifespan: Why We Age and Why We Don't Have To",author:"David A. Sinclair",rating:5,status:"finished",tags:["science/health"],comment:"Very insightful, sometimes overly optimistic, but a hugely important journey as I turned 40.",notes:"Aging hallmarks: genetic instability, telomere attrition, epigenome alteration, proteostasis loss, deregulated nutrient-sensing, mitochondrial dysfunction, senescent cells, stem cell exhaustion. Aging is information loss. Calorie restriction is one of the most powerful mechanisms. HIIT, cold and heat exposure. Key compounds: Rapamycin (targets mTOR), Metformin, Resveratrol, NMN."},{year:2022,title:"A Random Walk Down Wall Street",author:"Burton Malkiel",rating:4,status:"finished",tags:["investing"],comment:"Best and most up to date investment book. Covers everything I learned in 10 years \u2014 should have been my first book.",notes:"Long term expected return = yield + growth + multiple change. Smart beta strategies have been arbitraged away after publication. 5 rules to select stocks: 5 years above avg earnings growth, GARP, psychological story, trade as little as possible, sell losers for tax loss harvesting."},{year:2022,title:"No Bad Kids: Toddler Discipline Without Shame",author:"Janet Julian",rating:4,status:"finished",tags:["parenting"],comment:"My first book on toddlers, I learned a lot. Very anecdotal but practical and dense.",notes:"Deal with your toddler like a CEO deals with a respected employee. Set limits early and clearly. Acknowledge the toddler's feelings and difficulty. Consistent, predictable and calm response \u2014 not punishment. Don't let the kid push your buttons."},{year:2022,title:"INSPIRED: How to Create Tech Products Customers Love",author:"Marty Cagan",rating:4,status:"finished",tags:["tech/product"],comment:"A must read and starting point for IT product management.",notes:"Half to two-thirds of ideas will not bring value. Prototypes need 1/10th of the work to test a hypothesis. Product Vision is for 2-10 years. Product discovery eliminates: value risk, usability risk, feasibility risk, business risk. Good teams: compelling vision, inspired by observing customers, running tests all the time, engineers involved in discovery."},{year:2022,title:"Team Topologies",author:"Manuel Pais & Matthew Skelton",rating:4,status:"finished",tags:["tech/product"],comment:"A very pragmatic model on how to think about engineering team topologies.",notes:"Conway's law vs reverse Conway maneuver. Four fundamental team types: stream-aligned, platform, enabling, complicated-subsystem. DevOps teams should be temporary enabling teams \u2014 a permanent DevOps team is an antipattern. Platform team enables stream-aligned teams with the Thinnest Viable Platform."},{year:2022,title:"The Changing World Order",author:"Ray Dalio",rating:4,status:"finished",tags:["history/society", "investing"],comment:"An outstanding bird's eye view on empires and history with a reflection on the current world order.",notes:"Cycles of nations repeat every ~150 years, rooted in human psychology. Three big cycles: debt cycle, internal order cycle, external order cycle. Determinants: education, innovation, military, trade, financial centers, reserve currency status. About 5-10 years till the big cycles reach a more unstable phase."},{year:2022,title:"Common Stocks and Uncommon Profits",author:"Philip Arthur Fisher",rating:4,status:"finished",tags:["investing"],comment:"A great summary on conservative growth investing.",notes:"Scuttlebutt: 15 factors including market potential, management determination, R&D effectiveness, sales org, profit margin, employee relations. Growth investing is a bet on long-term compounding. Time to sell is almost never. Don't overstress diversification \u2014 min 10 with variety of industries."},{year:2022,title:"Little Book of Common Sense Investing",author:"John C. Bogle",rating:4,status:"finished",tags:["investing"],comment:"Convincing evidence that indexing is really the most rational approach. Even 99%+ of professionals never beat it over 10-20 years.",notes:"Largest enemies of investors: expenses, emotions, taxes. Expected returns = earnings growth + dividend yield + P/E change. Graham admitted late in his career that the principles of Intelligent Investor don't work much anymore as market efficiency improved."},{year:2022,title:"The Intelligent Investor",author:"Benjamin Graham",rating:3,status:"finished",tags:["investing"],comment:"Very outdated from 50+ years ago, but extremely powerful to see the big picture and learn to invest like a business not a casino.",notes:"'Investing is most intelligent when it is most business like.' Margin of safety. Defensive investor rules: 10-30 stocks, large and conservatively financed companies, long dividend record, max 20-25x P/E. Focus on pricing: buy low, sell high compared to fair value."},{year:2022,title:"Mastering the Market Cycles",author:"Howard Marks",rating:3,status:"finished",tags:["investing"],comment:"Super repetitive and very anecdotal but some good insights.",notes:"Oaktree raised cash 2 years before 2008 crash, started buying in autumn 2008. Bull/bear trends have 3 stages: only a few believe it; majority sees it; bubble/panic when valuation doesn't matter. Markets fluctuate between overly positive and negative because investors follow the herd."},{year:2022,title:"The Most Important Thing",author:"Howard Marks",rating:3,status:"finished",tags:["investing"],comment:"A huge brain dump of common sense insights on investing.",notes:"Second level thinking: what do I know that others don't? Risk is not volatility \u2014 risk can be many types. Risk paradox: quality stocks can be overpriced and thus very risky, cheap ugly stocks can be safe. Focus on businesses not macro."},{year:2022,title:"The Little Book That Beats the Market",author:"Joel Greenblatt",rating:3,status:"finished",tags:["investing"],comment:"Very short, well written, well tested.",notes:"Rank stocks by earnings yield and return on capital. Buy top 30-50, hold a year, sell, repeat. The formula has close results to very complex 70+ factor systems. Might underperform for max 1-3 years but beats market long term."},{year:2022,title:"Escaping the Build Trap",author:"Melissa Perri",rating:3,status:"finished",tags:["tech/product"],comment:"Good collection of product management best practices.",notes:"Build trap: org focuses on output rather than outcomes. Product-led organization required for long-term success. Strategy is not a plan but a framework to make decisions. Innovation can only happen if leaders actively say no to certain things."},{year:2022,title:"Wealth, War and Wisdom",author:"Barton Biggs",rating:3,status:"finished",tags:["investing", "history/society"],comment:"Good historic overview of what worked in the past.",notes:"Gold stores value long term. Real estate often confiscated or bombed in war but farmland works. Bonds often worst in crisis. Stocks produce real return but exchanges can close. Jewelry proved excellent to exchange for anything."},{year:2022,title:"The Little Book of Common Sense Investing",author:"John C. Bogle",rating:4,status:"finished",tags:["investing"],comment:"",notes:""},{year:2022,title:"Hold Me Tight",author:"Sue Johnson",rating:0,status:"reading",tags:["psychology", "parenting"],comment:"",notes:""},{year:2022,title:"Principles for Navigating Big Debt Crises",author:"Ray Dalio",rating:0,status:"reading",tags:["investing"],comment:"Not an easy read.",notes:""},{year:2021,title:"Range: Why Generalists Triumph",author:"David Epstein",rating:3,status:"finished",tags:["psychology", "history/society"],comment:"Many anecdotes to make a few interesting points.",notes:"Kind vs wicked learning environments need very different approaches. The most successful problem solvers first categorize the problem type to find a good analogue. Exceptional achievers are not afraid of changing often until they find a great quality match. Delaying specialization leads to better fits later."},{year:2021,title:"The Snowball: Warren Buffett and the Business of Life",author:"Peter Lynch",rating:3,status:"finished",tags:["investing"],comment:"Too long and detail oriented, but deep insights.",notes:"'Praise by name, criticize by category.' 'Don't ask a barber if you need a haircut.' Compounding. Margin of safety. Protecting principal."},{year:2021,title:"Measure What Matters: OKRs",author:"John Doerr",rating:3,status:"finished",tags:["tech/product"],comment:"",notes:"Inspirational OKRs vs Committed OKRs. Quality and Quantity OKRs must go in pairs."},{year:2021,title:"The Motley Fool Investment Guide",author:"Tom Gardner",rating:4,status:"finished",tags:["investing"],comment:"",notes:""},{year:2021,title:"One Up On Wall Street",author:"Peter Lynch",rating:4,status:"finished",tags:["investing"],comment:"",notes:""},{year:2021,title:"100 Baggers",author:"Christopher W. Mayer",rating:0,status:"finished",tags:["investing"],comment:"",notes:"1. Look for them. 2. Growth, growth and more growth. 3. Lower multiples preferred. 4. Economic moats are a necessity. 5. Smaller companies preferred. 6. Owner-operators preferred. 7. You need time \u2014 Coffee-Can approach. 8. Good filter. 9. Luck helps. 10. Be a reluctant seller."},{year:2021,title:"Cribsheet: A Data-Driven Guide to Parenting",author:"Emily Oster",rating:4,status:"reading",tags:["parenting", "science/health"],comment:"Finally a new type of guide: data driven, not anecdote.",notes:""},{year:2021,title:"Secrets of the Baby Whisperer",author:"Melinda Blau & Tracy Hogg",rating:2,status:"finished",tags:["parenting"],comment:"A little old-school and anecdote driven. Probably there are many better books.",notes:""},{year:2020,title:"Why We Sleep",author:"Matthew Walker PhD",rating:5,status:"finished",tags:["science/health"],comment:"",notes:"Human circadian cycle averages 24h 15min. Melatonin triggers sleep; adenosine accumulates sleep pressure \u2014 completely disconnected. Every aspect of athletic performance drops below 8 hours. 15-20 hours awake equals drunk driving in terms of reaction time. WHO categorises night shift jobs as carcinogenic. Alcohol is the most disruptive substance for REM sleep. REM is like overnight therapy: the only time the brain has no noradrenaline, allowing processing without emotional charge."},{year:2020,title:"How to Change Your Mind",author:"Michael Pollan",rating:4,status:"finished",tags:["science/health", "psychology"],comment:"History, medical background, and self exploration on psychedelic compounds (LSD, psilocybin, DMT). Very entertaining and comprehensive.",notes:"psilocybin reduces activity of the default mode network (DMN). The DMN acts as an orchestrator with inhibitory influence over lower brain areas. Entropic brain theory: suppressing the DMN allows brain domains to connect without the orchestrator. Terminally ill patients have an overactive DMN \u2014 temporarily suppressing it helps enormously."},{year:2020,title:"Breath: The New Science of a Lost Art",author:"James Nestor",rating:3,status:"finished",tags:["science/health"],comment:"Really good for summarizing all different breathing schools and techniques.",notes:"Mouth breathing is very bad for overall health. Most beneficial seems to be breathing less in general intentionally but occasional cizing decisions already made. Linear time focused vs event based flexible."},{year:2019,title:"Enlightenment Now",author:"Steven Pinker",rating:4,status:"finished",tags:["history/society"],comment:"Great book, very long, many notes.",notes:""},{year:2019,title:"Four Futures",author:"Peter Frase",rating:4,status:"finished",tags:["history/society"],comment:"Four very different but not impossible futures. More of a study than science fiction.",notes:""},{year:2019,title:"The Headspace Guide to Meditation",author:"Andy Puddicombe",rating:4,status:"reading",tags:["mindfulness"],comment:"Super good light reading on becoming a monk and back.",notes:""},{year:2019,title:"Educated",author:"Tara Westover",rating:3,status:"finished",tags:["fiction/other"],comment:"The story is dramatic, poetic, psychologically and sociologically very interesting.",notes:""},{year:2019,title:"Gut",author:"Giulia Enders",rating:0,status:"reading",tags:["science/health"],comment:"",notes:""},{year:2018,title:"21 Lessons for the 21st Century",author:"Yuval Noah Harari",rating:5,status:"finished",tags:["history/society"],comment:"",notes:"Social pressures visible in populism result from a class that is not needed anymore. We should not compare a single human to a single AI but whole systems \u2014 all AI doctors can be upgraded at once. Besides nuclear warfare, the global ecological crisis and technology disruption are the other two big problems requiring global solutions."},{year:2018,title:"Sapiens: A Brief History of Humankind",author:"Yuval Noah Harari",rating:5,status:"finished",tags:["history/society"],comment:"A number one international best seller.",notes:""},{year:2018,title:"Homo Deus: A Brief History of Tomorrow",author:"Yuval Noah Harari",rating:5,status:"finished",tags:["history/society"],comment:"Brilliant book on how AI and data sciences will reshape civilisation, culture, religions, ethics. Very readable.",notes:"In 2010 famine killed 1M whereas obesity killed 3M. In ancient times l incomprehensible."},{year:2018,title:"The Phoenix Project",author:"Gene Kim",rating:4,status:"finished",tags:["tech/product"],comment:"DevOps bible. Fiction story of an IT VP and permanent fire fighting. More adrenalin than an action movie.",notes:"4 types of work: business projects, internal projects, change management, unplanned work. Knowledge monopolization by one key person creates a bottleneck for the whole company. Throughput of the business is at its bottleneck."},{year:2018,title:"Bad Blood",author:"John Carreyrou",rating:3,status:"finished",tags:["tech/product"],comment:"The full inside story of the breathtaking rise and shocking collapse of Theranos.",notes:""},{year:2018,title:"Principles: Life and Work",author:"Ray Dalio",rating:3,status:"finished",tags:["tech/product", "investing"],comment:"The founder of Bridgewater Associates explains his life and work principles. Sometimes dry, sometimes trivial... but overall worth reading.",notes:"For your life: meaningful work and meaningful relationships. For your job: radical transparency and thoughtful disagreement. Write down your own principles."},{year:2018,title:"Scale",author:"Geoffrey West",rating:3,status:"finished",tags:["science/health", "history/society"],comment:"A dazzling exploration of the hidden laws that govern the life cycle of everything.",notes:"Finite time singularity: accelerating growth cannot be sustained without regular paradigm shifts. Companies scale at 0.9, city infrastructure at 0.85, organisms at 0.75. 1 hour max daily commute time has been invariant for thousands of years. Innovation lifecycle is now shorter than human life."},{year:2018,title:"Foundation",author:"Isaac Asimov",rating:3,status:"finished",tags:["fiction/other"],comment:"Entertaining science fiction with some inspirational messages.",notes:"'Violence is the last refuge of the incompetent.'"},{year:2018,title:"Saturnin",author:"Zdenek Jirotka",rating:3,status:"finished",tags:["fiction/other"],comment:"Czech classic // ── filters state ─────────────────────
const F = {s:'', r:'0', t:'', y:'0'};

function pick(el) {
  const f = el.dataset.f;
  document.querySelectorAll(`.fb[data-f="${f}"]`).forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  F[f] = el.dataset.v;
  render();
}

function starsHtml(n) {
  let s='';
  for(let i=1;i<=5;i++) s+=`<span class="${i<=n?'':'cdim'}">&#9733;</span>`;
  return s;
}

function statusClass(st) {
  if(!st) return '';
  return st.replace(' ','-');
}

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  const minR = parseInt(F.r)||0;

  const shown = BOOKS.filter(bk => {
    if(F.s && bk.status !== F.s) return false;
    if(minR && bk.rating < minR) return false;
    if(F.t && !bk.tags.includes(F.t)) return false;
    if(F.y && F.y!=='0') {
      const yr = parseInt(F.y);
      if(yr===2014 ? bk.year>2014 : bk.year!==yr) return false;
    }
    if(q) {
      const hay = (bk.title+' '+bk.author+' '+bk.notes+' '+bk.comment).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  // stats (always on full set)
  const fin = BOOKS.filter(b=>b.status==='finished');
  const rated = fin.filter(b=>b.rating>0);
  const avg = rated.length ? (rated.reduce((a,b)=>a+b.rating,0)/rated.length).toFixed(1) : '—';
  document.getElementById('st0').textContent = BOOKS.length;
  document.getElementById('st1').textContent = fin.length;
  document.getElementById('st2').textContent = BOOKS.filter(b=>b.status==='reading').length;
  document.getElementById('st3').textContent = avg;

  document.getElementById('cl').textContent = shown.length===BOOKS.length
    ? `// ${BOOKS.length} books`
    : `// showing ${shown.length} of ${BOOKS.length} books`;

  const grid = document.getElementById('grid');
  if(!shown.length) { grid.innerHTML='<div class="nores">// no results</div>'; return; }

  grid.innerHTML = shown.map((bk,idx) => {
    const id = 'n'+idx;
    const sc = statusClass(bk.status);
    const hasnotes = bk.notes && bk.notes.length > 5;
    return `<div class="card">
      <div class="ctop">
        <div class="card-title-wrap">
          <div class="ctitle">${bk.title}</div>
          ${bk.author?`<div class="cauthor">${bk.author}</div>`:''}
        </div>
        <div class="cstars">${starsHtml(bk.rating)}</div>
      </div>
      <div class="meta">
        <span class="byear">${bk.year}</span>
        ${sc?`<span class="bst ${sc}">${bk.status}</span>`:''}
        ${bk.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
      ${bk.comment?`<div class="comment">${bk.comment}</div>`:''}
      ${hasnotes?`<button class="ntog" onclick="tog('${id}')">&#9654; notes</button><div class="nbody" id="${id}">${bk.notes}</div>`:''}
    </div>`;
  }).join('');
}

function tog(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? '▾ notes' : '▶ notes';
}

render();
</script>
