    .log-var-del:hover{background:rgba(255,80,80,.08);border-color:rgba(255,80,80,.5);color:rgba(255,80,80,.9)}
    .log-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    .log-new-input{font-family:inherit;font-size:.88em;padding:5px 10px;
      background:rgba(14,184,255,.04);border:1px solid rgba(14,184,255,.22);border-radius:3px;

    .log-new-input:focus{border-color:rgba(14,184,255,.55)}
    .log-add-btn{background:rgba(14,184,255,.06);border:1px solid rgba(14,184,255,.22);color:rgba(14,184,255,.88);}

    .log-status{font-size:.82em;letter-spacing:.04em;color:rgba(14,184,255,.70);margin-left:auto}
  </style>
</head>

<script>
let activeDays = 7;
let allDocs    = [];
let charts     = {};

const GRID_COLOR = 'rgba(14,184,255,0.1)';
const TICK_COLOR = 'rgba(200,230,255,0.82)';

document.getElementById('rangeRow').addEventListener('click', e => {
  const btn = e.target.closest('.range-btn');
  if (!btn) return;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeDays = parseInt(btn.dataset.days);
  render(allDocs);
});

function dateStr(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString().slice(0, 10);
}

col.orderBy('date', 'asc').onSnapshot(snap => {
  allDocs = snap.docs.map(d => d.data());
  render(allDocs);
}, err => {
  document.getElementById('status').textContent = 'error loading data — ' + err.message;
});

function render(docs) {
  const cutoff = dateStr(activeDays - 1);
  const data   = docs.filter(d => d.date >= cutoff).sort((a,b) => a.date.localeCompare(b.date));
  if (!data.length) {
    document.getElementById('statGrid').innerHTML = '';
    document.getElementById('chartGrid').innerHTML = `
      <div class="no-data" style="grid-column:1/-1">no health data yet.<br><br>
        run the <a href="https://github.com/tigerbot82/myCloudeTest/actions" target="_blank">garmin sync workflow</a>
        to pull your data from garmin connect.</div>`;
    document.getElementById('status').textContent = 'no data in selected range';
    return;
  }
  document.getElementById('status').textContent =
    `${data.length} days · last sync: ${data[data.length-1]?.syncedAt?.toDate?.()?.toLocaleString?.() ?? 'unknown'}`;
  renderStats(data);
  renderCharts(data);
}

function renderStats(data) {
  const today = data[data.length - 1];
  const cards = [
    { icon:'👣', label:'steps',         value: fmt(today.steps),                    unit:'steps' },
    { icon:'🔥', label:'calories',      value: fmt(today.calories),                 unit:'kcal'  },
    { icon:'💓', label:'resting hr',    value: today.restingHR ?? '—',              unit:'bpm'   },
    { icon:'⚡', label:'body battery',  value: today.bodyBattery?.end ?? '—',       unit:'/ 100' },
    { icon:'😰', label:'avg stress',    value: today.avgStress ?? '—',              unit:'/ 100' },
    { icon:'🌊', label:'hrv',           value: today.hrv?.lastNight ?? '—',         unit:'ms'    },
    { icon:'😴', label:'sleep',         value: today.sleep?.durationHours ?? '—',   unit:'hrs'   },
    { icon:'🩸', label:'spo2',          value: today.spo2?.avg ?? '—',              unit:'%'     },
    { icon:'🏃', label:'distance',      value: today.distanceKm ?? '—',             unit:'km'    },
    { icon:'⏱', label:'intensity',     value: today.intensityMinutes ?? '—',        unit:'min'   },
    { icon:'🫁', label:'breathing',     value: today.respiration?.avg ?? '—',       unit:'br/min'},
    { icon:'❤️', label:'vo2max',        value: today.vo2max ?? '—',                 unit:'ml/kg/min'},
    { icon:'🏋️', label:'readiness',    value: today.trainingReadiness ?? '—',      unit:'/ 100' },
    { icon:'⚖️', label:'weight',        value: today.weight?.kg ?? '—',             unit:'kg'    },
  ].filter(c => c.value !== '—' || ['steps','sleep','resting hr','hrv','body battery','avg stress'].includes(c.label));
  document.getElementById('statGrid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-icon">${c.icon}</div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-unit">${c.unit}</div>
      <div class="stat-date">latest: ${today.date}</div>
    </div>`).join('');
}

const chartDefs = [
  { id:'steps',    title:'// steps //',              key: d => d.steps,                  color:'rgba(14,184,255,0.85)' },
  { id:'hrv',      title:'// hrv (last night) //',   key: d => d.hrv?.lastNight,         color:'rgba(160,80,255,0.85)' },
  { id:'rhr',      title:'// resting heart rate //', key: d => d.restingHR,              color:'rgba(255,80,140,0.85)' },
  { id:'stress',   title:'// avg stress //',         key: d => d.avgStress,              color:'rgba(255,200,80,0.85)' },
  { id:'battery',  title:'// body battery (end) //', key: d => d.bodyBattery?.end,       color:'rgba(80,220,160,0.85)' },
  { id:'sleep',    title:'// sleep duration //',     key: d => d.sleep?.durationHours,   color:'rgba(80,160,255,0.85)' },
  { id:'spo2',     title:'// spo2 avg //',           key: d => d.spo2?.avg,              color:'rgba(80,220,255,0.85)' },
  { id:'calories', title:'// active calories //',    key: d => d.activeCalories,         color:'rgba(255,140,60,0.85)'  },
];

function renderCharts(data) {
  const labels = data.map(d => d.date.slice(5));
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  document.getElementById('chartGrid').innerHTML = chartDefs.map(def => `
    <div class="chart-panel">
      <div class="chart-title">${def.title}</div>
      <div class="chart-wrap"><canvas id="chart-${def.id}"></canvas></div>
    </div>`).join('') + `
    <div class="chart-panel">
      <div class="chart-title">// sleep stages //</div>
      <div class="chart-wrap"><canvas id="chart-sleepstages"></canvas></div>
    </div>`;
  chartDefs.forEach(def => {
    const values = data.map(def.key);
    if (values.every(v => v == null)) return;
    charts[def.id] = makeLineChart(`chart-${def.id}`, labels, values, def.color);
  });
  buildSleepStagesChart(data, labels);
}

function makeLineChart(canvasId, labels, values, color) {
  return new Chart(document.getElementById(canvasId).getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [{
      data: values, borderColor: color, backgroundColor: color.replace('0.85','0.10'),
      borderWidth: 1.5, pointRadius: 3, pointBackgroundColor: color,
      fill: true, tension: 0.35, spanGaps: true,
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { ...tooltipStyle() } },
      scales: {
        x: { grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:10}} },
        y: { grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:10}}, beginAtZero:false },
      }
    }
  });
}

function buildSleepStagesChart(data, labels) {
  const deep  = data.map(d => d.sleep?.deepSleepHours  ?? null);
  const rem   = data.map(d => d.sleep?.remSleepHours   ?? null);
  const light = data.map(d => d.sleep?.lightSleepHours ?? null);
  const awake = data.map(d => d.sleep?.awakeHours      ?? null);
  if ([...deep,...rem,...light].every(v => v == null)) return;
  charts['sleepstages'] = new Chart(document.getElementById('chart-sleepstages').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [
      { label:'deep',  data:deep,  backgroundColor:'rgba(12,123,192,0.85)', stack:'s' },
      { label:'rem',   data:rem,   backgroundColor:'rgba(160,80,255,0.8)',  stack:'s' },
      { label:'light', data:light, backgroundColor:'rgba(80,160,255,0.6)',  stack:'s' },
      { label:'awake', data:awake, backgroundColor:'rgba(255,80,80,0.5)',   stack:'s' },
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display:true, labels:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:10},boxWidth:10} }, tooltip:{...tooltipStyle()} },
      scales: {
        x: { stacked:true, grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:10}} },
        y: { stacked:true, grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:10}} },
      }
    }
  });
}

function tooltipStyle() {
  return { backgroundColor:'rgba(4,6,18,0.97)', borderColor:'rgba(14,184,255,0.45)', borderWidth:1,
    titleColor:'#0eb8ff', bodyColor:'rgba(200,230,255,0.82)',
    titleFont:{family:'Share Tech Mono'}, bodyFont:{family:'Share Tech Mono'} };
}

function fmt(n) { return n != null ? Number(n).toLocaleString() : '—'; }

function triggerManualNote() {
  alert('To sync data, go to GitHub Actions → "Garmin → Firestore Sync" → Run workflow.\n\nData auto-syncs daily at 07:00 UTC.');
}

// ── MFA relay ─────────────────────────────────────────────────────
const mfaRef   = db.collection('_config').doc('garmin_mfa_pending');
const mfaPanel = document.getElementById('mfaPanel');
const mfaInput = document.getElementById('mfaCode');

mfaRef.onSnapshot(snap => {
  if (snap.exists && snap.data().status === 'waiting') {
    mfaPanel.classList.add('visible');
    mfaInput.focus();
    document.getElementById('mfaStatus').textContent = 'workflow is waiting — enter the code from your garmin email';
  } else {
    mfaPanel.classList.remove('visible');
    mfaInput.value = '';
    document.getElementById('mfaStatus').textContent = '';
  }
});

mfaInput.addEventListener('input', () => {
  if (mfaInput.value.replace(/\D/g,'').length === 6) submitMfa();
});

function submitMfa() {
  const code = mfaInput.value.replace(/\D/g,'');
  if (code.length !== 6) { document.getElementById('mfaStatus').textContent = 'enter 6-digit code'; return; }
  document.getElementById('mfaStatus').textContent = 'submitting...';
  mfaRef.set({ status:'submitted', code }, { merge:true })
    .then(() => { document.getElementById('mfaStatus').textContent = '✓ code sent — workflow resuming'; })
    .catch(e  => { document.getElementById('mfaStatus').textContent = 'error: ' + e.message; });
}

// ── Lifestyle Log ──────────────────────────────────────────────────────────
const customVarsRef = db.collection('_config').doc('custom_vars');
let logVarDefs = [];   // [{name, unit}]
let logDate    = new Date().toISOString().slice(0, 10);
let logValues  = {};   // name → current value for logDate

function fmtLogDate(ds) {
  const [y,m,d] = ds.split('-');
  return `${d}.${m}.${y}`;
}

function logNavDay(delta) {
  const dt = new Date(logDate);
  dt.setDate(dt.getDate() + delta);
  const newDate = dt.toISOString().slice(0, 10);
  if (newDate > new Date().toISOString().slice(0, 10)) return; // don't go to future
  logDate = newDate;
  document.getElementById('logNext').disabled = logDate >= new Date().toISOString().slice(0, 10);
  loadLogForDate(logDate);
}

function renderLogVars() {
  const container = document.getElementById('logVars');
  if (!logVarDefs.length) {
    container.innerHTML = '<div style="font-size:.88em;color:rgba(14,184,255,.60);grid-column:1/-1">no variables defined yet — add one below</div>';
    return;
  }
  container.innerHTML = logVarDefs.map(v => `
    <div class="log-var">
      <div style="display:flex;align-items:center;gap:6px">
        <div class="log-var-label">${v.name}</div>
        <button class="log-var-del" onclick="deleteLogVar('${v.name}')" title="remove variable">✕</button>
      </div>
      <div class="log-var-row">
        <input class="log-var-input" id="logval-${v.name.replace(/\s/g,'_')}"
          type="number" step="0.1" placeholder="—"
          value="${logValues[v.name] != null ? logValues[v.name] : ''}">
        <span class="log-var-unit">${v.unit}</span>
      </div>
    </div>`).join('');
}

function loadLogForDate(date) {
  document.getElementById('logDateLabel').textContent = fmtLogDate(date);
  col.doc(date).get().then(snap => {
    logValues = (snap.exists && snap.data().custom) ? {...snap.data().custom} : {};
    renderLogVars();
  });
}

function addLogVar() {
  const nameEl = document.getElementById('logNewName');
  const unitEl = document.getElementById('logNewUnit');
  const name   = nameEl.value.trim();
  const unit   = unitEl.value.trim();
  if (!name) { setLogStatus('enter a variable name'); return; }
  if (logVarDefs.some(v => v.name.toLowerCase() === name.toLowerCase())) {
    setLogStatus('variable already exists'); return;
  }
  logVarDefs.push({ name, unit });
  nameEl.value = ''; unitEl.value = '';
  saveVarDefs().then(() => { renderLogVars(); setLogStatus(`added: ${name}`); });
}

function deleteLogVar(name) {
  logVarDefs = logVarDefs.filter(v => v.name !== name);
  saveVarDefs().then(() => { renderLogVars(); setLogStatus(`removed: ${name}`); });
}

function saveVarDefs() {
  return customVarsRef.set({ vars: logVarDefs }, { merge: false });
}

function saveLog() {
  const custom = {};
  logVarDefs.forEach(v => {
    const el = document.getElementById('logval-' + v.name.replace(/\s/g,'_'));
    if (el && el.value !== '') custom[v.name] = parseFloat(el.value);
  });
  if (!Object.keys(custom).length) { setLogStatus('nothing to save'); return; }
  setLogStatus('saving...');
  col.doc(logDate).set({ custom }, { merge: true })
    .then(() => setLogStatus('✓ saved for ' + fmtLogDate(logDate)))
    .catch(e => setLogStatus('error: ' + e.message));
}

function setLogStatus(msg) {
  const el = document.getElementById('logStatus');
  if (el) { el.textContent = msg; clearTimeout(el._t); el._t = setTimeout(() => el.textContent = '', 4000); }
}

// Bootstrap log panel
customVarsRef.get().then(snap => {
  logVarDefs = (snap.exists && snap.data().vars) ? snap.data().vars : [];
  loadLogForDate(logDate);
}).catch(() => { loadLogForDate(logDate); });
</script>
</body>
