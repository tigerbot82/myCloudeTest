<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Share Tech Mono','Courier New',monospace;
      min-height:100vh; color:#c8e2f5; overflow-x:hidden;
      background:#06091a;
      background-image:
        radial-gradient(ellipse 90% 60% at 8% 8%,  rgba(12,100,192,0.13) 0%,transparent 60%),
        radial-gradient(ellipse 70% 50% at 92% 92%, rgba(14,184,255,0.07) 0%,transparent 60%);
      background-attachment:fixed;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:radial-gradient(circle,rgba(14,184,255,0.05) 1px,transparent 1px);
      background-size:30px 30px;
    }

    /* ── nav ── */
    .top-nav{
      position:fixed;top:0;left:0;right:0;z-index:10;
      display:flex;align-items:center;gap:16px;
      padding:14px 28px;
      background:rgba(4,6,18,0.97);
      border-bottom:1px solid rgba(14,184,255,0.14);
      box-shadow:0 1px 24px rgba(0,0,0,0.7);
    }
    .nav-back{font-size:1em;letter-spacing:.06em;color:rgba(14,184,255,.9);text-decoration:none;transition:color .15s}
    .nav-back:hover{color:#0eb8ff}
    .nav-crumb{font-size:.94em;letter-spacing:.1em;color:rgba(14,184,255,.72)}
    .nav-sync{
      margin-left:auto;font-size:.94em;letter-spacing:.06em;
      padding:6px 16px;border:1px solid rgba(14,184,255,.35);border-radius:3px;
      background:transparent;color:rgba(14,184,255,.82);
      cursor:pointer;transition:all .15s;
    }
    .nav-sync:hover{background:rgba(14,184,255,.1);color:#0eb8ff;border-color:rgba(14,184,255,.7)}

    /* ── page layout ── */
    .page{
      position:relative;z-index:1;
      max-width:1100px;margin:0 auto;
      padding:90px 24px 60px;
      display:flex;flex-direction:column;gap:28px;
    }

    /* ── header ── */
    .hdr{text-align:center;padding:8px 0}
    .hdr-pre{font-size:.92em;letter-spacing:.12em;color:rgba(14,184,255,.78);margin-bottom:10px;text-transform:uppercase}
    .hdr h1{
      font-size:1.9em;letter-spacing:.1em;text-transform:uppercase;color:#0eb8ff;
      text-shadow:0 0 24px rgba(14,184,255,.4);
    }
    .hdr-sub{font-size:.92em;letter-spacing:.1em;color:rgba(14,184,255,.72);margin-top:8px}

    /* ── range picker ── */
    .range-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .range-btn{
      font-family:inherit;font-size:.98em;letter-spacing:.06em;
      padding:8px 24px;border-radius:3px;cursor:pointer;
      border:1px solid rgba(14,184,255,.3);
      background:transparent;color:rgba(14,184,255,.82);
      transition:all .15s;
    }
    .range-btn:hover{background:rgba(14,184,255,.07);color:rgba(14,184,255,.95)}
    .range-btn.active{background:rgba(14,184,255,.12);color:#0eb8ff;border-color:rgba(14,184,255,.65)}

    /* ── stat cards ── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
    .stat-card{
      padding:18px 16px 14px;
      background:rgba(8,12,32,0.97);
      border:1px solid rgba(14,184,255,.12);
      border-top:2px solid rgba(14,184,255,.28);
      border-radius:4px;
      box-shadow:0 4px 20px rgba(0,0,0,.55);
      display:flex;flex-direction:column;gap:5px;
    }
    .stat-icon{font-size:1.3em;line-height:1;opacity:.95}
    .stat-label{font-size:.88em;letter-spacing:.08em;color:rgba(14,184,255,.85);text-transform:uppercase;margin-top:2px}
    .stat-value{font-size:1.65em;color:#0eb8ff;letter-spacing:.02em}
    .stat-unit{font-size:.85em;color:rgba(14,184,255,.75)}
    .stat-date{font-size:.82em;color:rgba(14,184,255,.65);margin-top:2px}

    /* ── chart panels ── */
    .chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:14px}
    @media(max-width:520px){.chart-grid{grid-template-columns:1fr}}
    .chart-panel{
      padding:18px 16px 14px;
      background:rgba(8,12,32,0.97);
      border:1px solid rgba(14,184,255,.12);
      border-top:2px solid rgba(14,184,255,.2);
      border-radius:4px;
      box-shadow:0 4px 20px rgba(0,0,0,.55);
    }
    .chart-title{
      font-size:.94em;letter-spacing:.1em;text-transform:uppercase;
      color:rgba(14,184,255,.88);
      padding-bottom:10px;margin-bottom:12px;
      border-bottom:1px solid rgba(14,184,255,.14);
    }
    .chart-wrap{position:relative;height:180px}

    /* ── sleep breakdown ── */
    .sleep-bar-wrap{margin-top:14px}
    .sleep-bar{height:8px;border-radius:2px;display:flex;overflow:hidden;margin-bottom:6px}
    .sleep-seg{height:100%;transition:width .4s}
    .sleep-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
    .sleep-key{font-size:.88em;color:rgba(14,184,255,.85);display:flex;align-items:center;gap:5px}
    .sleep-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

    /* ── no data ── */
    .no-data{
      text-align:center;padding:60px 20px;
      font-size:1em;letter-spacing:.08em;color:rgba(14,184,255,.75);
      border:1px dashed rgba(14,184,255,.18);border-radius:4px;
      background:rgba(8,12,32,.8);
    }
    .no-data a{color:rgba(14,184,255,.85);text-decoration:none}
    .no-data a:hover{color:#0eb8ff}

    /* ── status bar ── */
    #status{font-size:.92em;letter-spacing:.06em;color:rgba(14,184,255,.75);text-align:center;margin-top:-12px}

    /* ── mfa relay panel ── */
    #mfaPanel{
      display:none;
      position:fixed;bottom:24px;right:24px;z-index:100;
      padding:20px 22px;
      background:rgba(4,6,18,0.99);
      border:1px solid rgba(14,184,255,.35);
      border-top:2px solid #0eb8ff;
      border-radius:4px;
      box-shadow:0 8px 40px rgba(0,0,0,.8);
      min-width:272px;
    }
    #mfaPanel.visible{display:flex;flex-direction:column;gap:12px}
    .mfa-title{font-size:.72em;letter-spacing:.2em;text-transform:uppercase;color:#0eb8ff}
    .mfa-desc{font-size:.66em;color:rgba(14,184,255,.45);line-height:1.6}
    .mfa-input-row{display:flex;gap:8px}
    #mfaCode{
      font-family:inherit;font-size:1.4em;letter-spacing:.3em;
      width:140px;padding:8px 10px;text-align:center;
      background:rgba(14,184,255,.04);
      border:1px solid rgba(14,184,255,.22);border-radius:3px;
      color:#0eb8ff;outline:none;
    }
    #mfaCode:focus{border-color:rgba(14,184,255,.55)}
    #mfaSubmit{
      font-family:inherit;font-size:.72em;letter-spacing:.12em;
      padding:8px 14px;border-radius:3px;cursor:pointer;
      background:rgba(14,184,255,.1);border:1px solid rgba(14,184,255,.3);
      color:#0eb8ff;transition:all .15s;
    }
    #mfaSubmit:hover{background:rgba(14,184,255,.2)}
    #mfaStatus{font-size:.64em;color:rgba(14,184,255,.38);min-height:1em}

    /* ── weather correlation section ── */
    .section-divider{border:none;border-top:1px solid rgba(14,184,255,.12);margin:4px 0}
    .correl-section-hdr{text-align:center}
    .correl-section-title{font-size:1.02em;letter-spacing:.12em;text-transform:uppercase;color:rgba(14,184,255,.88)}
    #correlStatus{font-size:.92em;letter-spacing:.06em;color:rgba(14,184,255,.72);text-align:center;margin-top:-12px}
    .correl-matrix{display:flex;flex-direction:column;gap:3px;margin-bottom:12px;overflow-x:auto}
    .correl-row{display:flex;gap:3px;align-items:stretch}
    .correl-hdr-cell{min-width:88px;padding:6px 6px;font-size:.88em;letter-spacing:.05em;text-align:center;color:rgba(14,184,255,.9);text-transform:uppercase}
    .correl-row-label{min-width:112px;padding:10px 10px 10px 0;font-size:.9em;letter-spacing:.05em;text-align:right;color:#c8e2f5;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end}
    .correl-cell{min-width:88px;padding:10px 6px;font-size:.92em;letter-spacing:.03em;text-align:center;border-radius:3px;border:1px solid rgba(14,184,255,.1);border-left-width:3px;background:rgba(6,9,24,0.99);cursor:default;transition:border-color .15s}
    .correl-cell:hover{border-color:rgba(14,184,255,.5)}
    .correl-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:.88em;letter-spacing:.05em;color:rgba(14,184,255,.82);margin-top:8px}

    /* ── correlation controls ── */
    .correl-controls{
      display:flex;flex-wrap:wrap;gap:24px;
      padding:20px;
      background:rgba(8,12,32,0.97);
      border:1px solid rgba(14,184,255,.12);
      border-top:2px solid rgba(14,184,255,.28);
      border-radius:4px;
      box-shadow:0 4px 20px rgba(0,0,0,.55);
    }
    .ctrl-group{display:flex;flex-direction:column;gap:10px;flex:1;min-width:200px}
    .ctrl-label{font-size:.92em;letter-spacing:.06em;color:rgba(14,184,255,.88)}
    .ctrl-val{color:#0eb8ff;font-size:1em}
    .ctrl-sublabel{font-size:.8em;letter-spacing:.05em;color:rgba(14,184,255,.55)}
    .warn-hint{color:rgba(255,200,80,.9)}
    input[type=range].correl-range{
      -webkit-appearance:none;appearance:none;
      width:100%;height:5px;border-radius:3px;outline:none;cursor:pointer;
      background:rgba(14,184,255,.18);
    }
    input[type=range].correl-range::-webkit-slider-thumb{
      -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
      background:#0eb8ff;cursor:pointer;
      box-shadow:0 0 10px rgba(14,184,255,.7);
    }
    input[type=range].correl-range::-moz-range-thumb{
      width:18px;height:18px;border-radius:50%;border:none;
      background:#0eb8ff;cursor:pointer;
      box-shadow:0 0 10px rgba(14,184,255,.7);
    }
    /* ── data coverage bars ── */
    .ctrl-coverage{gap:6px}
    .cov-item{display:flex;align-items:center;gap:8px}
    .cov-name{font-size:.88em;color:rgba(14,184,255,.88);min-width:90px}
    .cov-bar-bg{flex:1;height:5px;background:rgba(14,184,255,.12);border-radius:3px;overflow:hidden}
    .cov-bar{height:100%;border-radius:3px;transition:width .3s}
    .cov-pct{font-size:.82em;min-width:72px;text-align:right}
  </style>
</head>

<!-- ══════════════════════════════════════════════════════ App -->
<script>
let activeDays = 7;
let allDocs    = [];
let charts     = {};

// ── range picker ──────────────────────────────────────────────────────────────
document.getElementById('rangeRow').addEventListener('click', e => {
  const btn = e.target.closest('.range-btn');
  if (!btn) return;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeDays = parseInt(btn.dataset.days);
  render(allDocs);
});

// ── load data ─────────────────────────────────────────────────────────────────
function dateStr(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString().slice(0, 10);
}

col.orderBy('date', 'asc').onSnapshot(snap => {
  allDocs = snap.docs.map(d => d.data());
  render(allDocs);
}, err => {
  document.getElementById('status').textContent = 'error loading data — ' + err.message;
});

// ── render ────────────────────────────────────────────────────────────────────
function render(docs) {
  const cutoff = dateStr(activeDays - 1);
  const data   = docs.filter(d => d.date >= cutoff).sort((a,b) => a.date.localeCompare(b.date));

  if (!data.length) {
    renderEmpty();
    return;
  }

  document.getElementById('status').textContent =
    `${data.length} days loaded · last sync: ${data[data.length-1]?.syncedAt?.toDate?.()?.toLocaleString?.() ?? 'unknown'}`;

  renderStats(data);
  renderCharts(data);
  // correlations use ALL available Garmin data
  loadAndRenderCorrelations(allDocs).catch(e => {
    document.getElementById('correlStatus').textContent = 'weather unavailable — ' + e.message;
  });
}

function renderEmpty() {
  document.getElementById('statGrid').innerHTML = '';
  document.getElementById('chartGrid').innerHTML = `
    <div class="no-data" style="grid-column:1/-1">
      no health data yet.<br><br>
      run the <a href="https://github.com/tigerbot82/myCloudeTest/actions" target="_blank">garmin sync workflow</a>
      to pull your data from garmin connect.
    </div>`;
  document.getElementById('status').textContent = 'no data in selected range';
}

// ── today's stat cards ────────────────────────────────────────────────────────
function renderStats(data) {
  const today = data[data.length - 1];
  const cards = [
    { icon:'👣', label:'steps',       value: fmt(today.steps),              unit:'steps',   },
    { icon:'🔥', label:'calories',    value: fmt(today.calories),           unit:'kcal',    },
    { icon:'💓', label:'resting hr',  value: today.restingHR ?? '—',        unit:'bpm',     },
    { icon:'⚡', label:'body battery',value: today.bodyBattery?.end ?? '—', unit:'/ 100',   },
    { icon:'😰', label:'avg stress',  value: today.avgStress ?? '—',        unit:'/ 100',   },
    { icon:'🌊', label:'hrv',         value: today.hrv?.lastNight ?? '—',   unit:'ms',      },
    { icon:'😴', label:'sleep',       value: today.sleep?.durationHours ?? '—', unit:'hrs', },
    { icon:'🩸', label:'spo2',        value: today.spo2?.avg ?? '—',        unit:'%',       },
  ];

  document.getElementById('statGrid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-icon">${c.icon}</div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-unit">${c.unit}</div>
      <div class="stat-date">latest: ${today.date}</div>
    </div>`).join('');
}

// ── charts ────────────────────────────────────────────────────────────────────
const GRID_COLOR = 'rgba(14,184,255,0.1)';
const TICK_COLOR = 'rgba(14,184,255,0.65)';

const chartDefs = [
  { id:'steps',       title:'// steps //',         key: d => d.steps,                  color:'rgba(14,184,255,0.85)' },
  { id:'hrv',         title:'// hrv (last night) //', key: d => d.hrv?.lastNight,       color:'rgba(160,80,255,0.85)' },
  { id:'rhr',         title:'// resting heart rate //', key: d => d.restingHR,           color:'rgba(255,80,140,0.85)' },
  { id:'stress',      title:'// avg stress //',     key: d => d.avgStress,              color:'rgba(255,200,80,0.85)' },
  { id:'battery',     title:'// body battery (end) //', key: d => d.bodyBattery?.end,   color:'rgba(80,220,160,0.85)' },
  { id:'sleep',       title:'// sleep duration //', key: d => d.sleep?.durationHours,   color:'rgba(80,160,255,0.85)' },
  { id:'spo2',        title:'// spo2 avg //',       key: d => d.spo2?.avg,              color:'rgba(80,220,255,0.85)' },
  { id:'calories',    title:'// active calories //',key: d => d.activeCalories,         color:'rgba(255,140,60,0.85)' },
];

function renderCharts(data) {
  const labels = data.map(d => d.date.slice(5)); // MM-DD

  // destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  // build HTML
  document.getElementById('chartGrid').innerHTML = chartDefs.map(def => `
    <div class="chart-panel">
      <div class="chart-title">${def.title}</div>
      <div class="chart-wrap"><canvas id="chart-${def.id}"></canvas></div>
    </div>`).join('') + `
    <div class="chart-panel">
      <div class="chart-title">// sleep stages //</div>
      <div class="chart-wrap"><canvas id="chart-sleepstages"></canvas></div>
    </div>`;

  // draw each line chart
  chartDefs.forEach(def => {
    const values = data.map(def.key);
    if (values.every(v => v == null)) return;
    charts[def.id] = makeLineChart(`chart-${def.id}`, labels, values, def.color);
  });

  // sleep stages stacked bar
  buildSleepStagesChart(data, labels);
}

function makeLineChart(canvasId, labels, values, color) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: color,
        backgroundColor: color.replace('0.85','0.10'),
        borderWidth: 1.5,
        pointRadius: 3,
        pointBackgroundColor: color,
        fill: true,
        tension: 0.35,
        spanGaps: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { ...tooltipStyle() } },
      scales: {
        x: { grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 } } },
        y: { grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 } }, beginAtZero: false },
      }
    }
  });
}

function buildSleepStagesChart(data, labels) {
  const deep  = data.map(d => d.sleep?.deepSleepHours  ?? null);
  const rem   = data.map(d => d.sleep?.remSleepHours   ?? null);
  const light = data.map(d => d.sleep?.lightSleepHours ?? null);
  const awake = data.map(d => d.sleep?.awakeHours      ?? null);
  if ([...deep,...rem,...light].every(v => v == null)) return;

  const ctx = document.getElementById('chart-sleepstages').getContext('2d');
  charts['sleepstages'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'deep',  data: deep,  backgroundColor:'rgba(12,123,192,0.85)',  stack:'s' },
        { label:'rem',   data: rem,   backgroundColor:'rgba(160,80,255,0.8)',   stack:'s' },
        { label:'light', data: light, backgroundColor:'rgba(80,160,255,0.6)',   stack:'s' },
        { label:'awake', data: awake, backgroundColor:'rgba(255,80,80,0.5)',    stack:'s' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, labels: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 }, boxWidth: 10 } },
        tooltip: { ...tooltipStyle() }
      },
      scales: {
        x: { stacked: true, grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 } } },
        y: { stacked: true, grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 } } },
      }
    }
  });
}

function tooltipStyle() {
  return {
    backgroundColor: 'rgba(4,6,18,0.97)',
    borderColor: 'rgba(14,184,255,0.45)',
    borderWidth: 1,
    titleColor: '#0eb8ff',
    bodyColor: 'rgba(14,184,255,0.65)',
    titleFont: { family: 'Share Tech Mono' },
    bodyFont:  { family: 'Share Tech Mono' },
  };
}

function fmt(n) { return n != null ? Number(n).toLocaleString() : '—'; }

function triggerManualNote() {
  alert('To sync data, go to GitHub Actions → "Garmin → Firestore Sync" → Run workflow.\n\nData auto-syncs daily at 07:00 UTC.');
}

// ── Weather correlations ──────────────────────────────────────────────────────
// Correlation state
let corrWindow  = 30;   // rolling window days (6–180)
let corrHistory = 0;    // 0 = all; N = last N days
let wxData      = null; // { date → {tempMean, sunshine, daylight, precip} }
let corrAllData = [];   // all Garmin docs sorted asc
let correlCharts = {};

const CORR_PAIRS = [
  { h:'HRV',          w:'Temp °C',    hc:'rgba(160,80,255,0.85)'  },
  { h:'Sleep',        w:'Daylight h', hc:'rgba(80,160,255,0.85)'  },
  { h:'Stress',       w:'Sunshine h', hc:'rgba(255,200,80,0.85)'  },
  { h:'Body Battery', w:'Temp °C',    hc:'rgba(80,220,160,0.85)'  },
];

// ── Open-Meteo archive fetch (full date range) ────────────────────
async function fetchWeatherArchive(startDate) {
  const endDate = new Date().toISOString().slice(0, 10);
  const cKey = `health_wx_arch_${startDate}`;
  try {
    const c = JSON.parse(localStorage.getItem(cKey) || 'null');
    if (c && Date.now() - c.t < 12 * 3600 * 1000) return c.d; // 12 h cache
  } catch(e) {}

  // Archive API covers any date back to 1940; ~5-day lag for very recent days
  const url = 'https://archive-api.open-meteo.com/v1/archive'
    + '?latitude=48.2416&longitude=16.4442'
    + '&daily=temperature_2m_mean,sunshine_duration,precipitation_sum,daylight_duration'
    + `&start_date=${startDate}&end_date=${endDate}`
    + '&timezone=Europe%2FVienna';

  const resp = await fetch(url);
  if (!resp.ok) throw new Error('archive ' + resp.status);
  const j = await resp.json();

  const byDate = {};
  (j.daily?.time || []).forEach((d, i) => {
    byDate[d] = {
      tempMean: j.daily.temperature_2m_mean[i],
      sunshine: (j.daily.sunshine_duration[i] ?? 0) / 3600,
      daylight: (j.daily.daylight_duration[i] ?? 0) / 3600,
      precip:   j.daily.precipitation_sum[i] ?? 0,
    };
  });

  try { localStorage.setItem(cKey, JSON.stringify({t: Date.now(), d: byDate})); } catch(e) {}
  return byDate;
}

// ── Pearson + rolling ─────────────────────────────────────────────
function pearson(xs, ys) {
  const pairs = xs.map((x,i) => [x, ys[i]]).filter(([x,y]) => x != null && y != null && !isNaN(x) && !isNaN(y));
  if (pairs.length < 3) return null;
  const n = pairs.length;
  const mx = pairs.reduce((s,[x]) => s+x, 0) / n;
  const my = pairs.reduce((s,[,y]) => s+y, 0) / n;
  let num=0, dx2=0, dy2=0;
  for (const [x,y] of pairs) { const a=x-mx, b=y-my; num+=a*b; dx2+=a*a; dy2+=b*b; }
  const denom = Math.sqrt(dx2*dy2);
  return denom < 1e-10 ? 0 : parseFloat((num/denom).toFixed(3));
}

function rollingCorr(dates, xs, ys, win) {
  return dates.slice(win-1).map((_, i) => ({
    date: dates[i+win-1],
    r:    pearson(xs.slice(i, i+win), ys.slice(i, i+win)),
  }));
}

function corrStyle(r) {
  if (r == null) return 'color:rgba(14,184,255,0.45);border-left-color:rgba(14,184,255,0.2)';
  const a = (0.55 + Math.abs(r) * 0.45).toFixed(2);
  return r >= 0
    ? `color:rgba(14,184,255,${a});border-left-color:rgba(14,184,255,${a})`
    : `color:rgba(255,80,80,${a});border-left-color:rgba(255,80,80,${a})`;
}

// ── Slice of Garmin data honoring corrHistory ─────────────────────
function getCorrelSlice() {
  if (!corrAllData.length) return [];
  const lim = (corrHistory > 0 && corrHistory < corrAllData.length)
    ? corrHistory : corrAllData.length;
  return corrAllData.slice(-lim);
}

// ── Build metric arrays for a data slice ──────────────────────────
function buildHW(data) {
  const dates = data.map(d => d.date);
  const H = {
    'HRV':          data.map(d => d.hrv?.lastNight        ?? null),
    'Sleep':        data.map(d => d.sleep?.durationHours  ?? null),
    'Stress':       data.map(d => d.avgStress             ?? null),
    'Body Battery': data.map(d => d.bodyBattery?.end      ?? null),
    'Steps':        data.map(d => d.steps                 ?? null),
    'Resting HR':   data.map(d => d.restingHR             ?? null),
  };
  const W = {
    'Temp °C':    dates.map(d => wxData?.[d]?.tempMean ?? null),
    'Sunshine h': dates.map(d => wxData?.[d]?.sunshine ?? null),
    'Daylight h': dates.map(d => wxData?.[d]?.daylight ?? null),
    'Precip mm':  dates.map(d => wxData?.[d]?.precip   ?? null),
  };
  return { dates, H, W };
}

// ── Render controls (called once, sliders keep state) ─────────────
function renderCorrelControls() {
  const total = corrAllData.length;
  const maxH  = Math.max(30, total);
  const curH  = (corrHistory > 0 && corrHistory < total) ? corrHistory : total;

  const metrics = [
    ['HRV',          corrAllData.filter(d => (d.hrv?.lastNight ?? null)       != null).length],
    ['Sleep',        corrAllData.filter(d => (d.sleep?.durationHours ?? null) != null).length],
    ['Stress',       corrAllData.filter(d => (d.avgStress ?? null)            != null).length],
    ['Body Battery', corrAllData.filter(d => (d.bodyBattery?.end ?? null)     != null).length],
    ['Steps',        corrAllData.filter(d => (d.steps ?? null)                != null).length],
    ['Resting HR',   corrAllData.filter(d => (d.restingHR ?? null)            != null).length],
  ];

  document.getElementById('correlControls').innerHTML = `
    <div class="correl-controls">
      <div class="ctrl-group">
        <div class="ctrl-label">rolling window &nbsp;·&nbsp; <span class="ctrl-val" id="winVal">${corrWindow}</span> days</div>
        <input type="range" class="correl-range" id="winSlider" min="6" max="180" step="1" value="${corrWindow}">
        <div class="ctrl-sublabel">6 days &nbsp;→&nbsp; 6 months</div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">history &nbsp;·&nbsp; <span class="ctrl-val" id="histVal">${curH}</span> days</div>
        <input type="range" class="correl-range" id="histSlider" min="30" max="${maxH}" step="1" value="${curH}">
        <div class="ctrl-sublabel">30 days &nbsp;→&nbsp; all available (${total})</div>
      </div>
      <div class="ctrl-group ctrl-coverage">
        <div class="ctrl-label">data coverage &nbsp;·&nbsp; ${total} days in firestore${total < 60
          ? ' &nbsp;<span class="warn-hint">↑ run workflow with sync_days=365 for more history</span>'
          : ''}</div>
        ${metrics.map(([k, n]) => {
          const pct = total > 0 ? Math.round(n / total * 100) : 0;
          const col = pct < 20 ? 'rgba(255,80,80,.9)' : pct < 60 ? 'rgba(255,200,80,.9)' : 'rgba(14,184,255,.9)';
          return `<div class="cov-item">
            <span class="cov-name">${k}</span>
            <div class="cov-bar-bg"><div class="cov-bar" style="width:${pct}%;background:${col}"></div></div>
            <span class="cov-pct" style="color:${col}">${pct}% &nbsp;(${n}d)</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  document.getElementById('winSlider').addEventListener('input', function() {
    corrWindow = parseInt(this.value);
    document.getElementById('winVal').textContent = corrWindow;
    refreshCorrelCharts();
  });
  document.getElementById('histSlider').addEventListener('input', function() {
    const v = parseInt(this.value);
    corrHistory = v >= maxH ? 0 : v;
    document.getElementById('histVal').textContent = corrHistory > 0 ? corrHistory : total;
    refreshCorrelCharts();
  });
}

// ── Render correlation matrix panel ──────────────────────────────
function renderCorrelMatrix() {
  const el = document.getElementById('correlMatrix');
  if (!el) return;
  const data = getCorrelSlice();
  const { dates, H, W } = buildHW(data);
  const hKeys = Object.keys(H), wKeys = Object.keys(W);
  const mat = {};
  hKeys.forEach(hk => { mat[hk] = {}; wKeys.forEach(wk => { mat[hk][wk] = pearson(H[hk], W[wk]); }); });

  el.innerHTML = `
    <div class="chart-title">// pearson r · biometrics vs weather · ${dates.length} days //</div>
    <div class="correl-matrix">
      <div class="correl-row">
        <div class="correl-row-label"></div>
        ${wKeys.map(wk => `<div class="correl-hdr-cell">${wk}</div>`).join('')}
      </div>
      ${hKeys.map(hk => `
        <div class="correl-row">
          <div class="correl-row-label">${hk}</div>
          ${wKeys.map(wk => {
            const r = mat[hk][wk];
            return `<div class="correl-cell" style="${corrStyle(r)}" title="${hk} vs ${wk}: r=${r ?? 'n/a'}">${r != null ? r : 'n/a'}</div>`;
          }).join('')}
        </div>`).join('')}
    </div>
    <div class="correl-legend">
      <span style="color:rgba(255,80,80,.95)">■ negative</span>
      <span style="color:rgba(14,184,255,.5)">■ near zero</span>
      <span style="color:rgba(14,184,255,.98)">■ positive</span>
      <span>&nbsp;· |r| = intensity · open-meteo archive · vienna 48.24°N</span>
    </div>`;
}

// ── Render rolling correlation charts ────────────────────────────
function renderCorrelRolling() {
  Object.values(correlCharts).forEach(c => c.destroy());
  correlCharts = {};

  const data = getCorrelSlice();
  if (data.length < corrWindow + 1) return;
  const { dates, H, W } = buildHW(data);

  CORR_PAIRS.forEach((p, i) => {
    const titleEl = document.getElementById(`rc-title-${i}`);
    if (titleEl) titleEl.textContent = `// ${corrWindow}d rolling r · ${p.h.toLowerCase()} vs ${p.w.toLowerCase()} //`;

    const el = document.getElementById(`cc-${i}`);
    if (!el) return;
    const roll = rollingCorr(dates, H[p.h], W[p.w], corrWindow);

    correlCharts[i] = new Chart(el.getContext('2d'), {
      type: 'line',
      data: {
        labels: roll.map(r => r.date.slice(5)),
        datasets: [{
          data: roll.map(r => r.r),
          borderColor: p.hc,
          backgroundColor: p.hc.replace('0.85','0.08'),
          borderWidth: 1.5, pointRadius: 1.5, pointBackgroundColor: p.hc,
          fill: true, tension: 0.35, spanGaps: true,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: {display:false}, tooltip: {...tooltipStyle()} },
        scales: {
          x: { grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR, font:{family:'Share Tech Mono',size:12}, maxTicksLimit:8} },
          y: {
            grid:{color:GRID_COLOR}, min:-1, max:1,
            afterBuildTicks: ax => { ax.ticks = [-1,-0.5,0,0.5,1].map(v => ({value:v})); },
            ticks: { color:TICK_COLOR, font:{family:'Share Tech Mono',size:12}, callback: v => v.toFixed(1) },
          },
        }
      }
    });
  });
}

function refreshCorrelCharts() {
  renderCorrelMatrix();
  renderCorrelRolling();
}

// ── Main entry point ──────────────────────────────────────────────
async function loadAndRenderCorrelations(rawDocs) {
  corrAllData = rawDocs.filter(d => d.date).sort((a,b) => a.date.localeCompare(b.date));
  const statusEl = document.getElementById('correlStatus');
  if (!corrAllData.length) { statusEl.textContent = 'no garmin data yet'; return; }

  statusEl.textContent = `fetching ${corrAllData.length} days of historical weather...`;

  try {
    wxData = await fetchWeatherArchive(corrAllData[0].date);
  } catch(e) {
    statusEl.textContent = 'weather unavailable — ' + e.message;
    return;
  }

  // Build static grid structure (canvases stay across slider updates)
  document.getElementById('correlGrid').innerHTML = `
    <div class="chart-panel" style="grid-column:1/-1" id="correlMatrix"></div>
    ${CORR_PAIRS.map((p, i) => `
      <div class="chart-panel">
        <div class="chart-title" id="rc-title-${i}"></div>
        <div class="chart-wrap"><canvas id="cc-${i}"></canvas></div>
      </div>`).join('')}`;

  renderCorrelControls();   // sliders + coverage (once)
  renderCorrelMatrix();
  renderCorrelRolling();

  const wxDays = Object.keys(wxData).filter(d => d >= corrAllData[0].date).length;
  statusEl.textContent = `open-meteo archive · vienna 1220 · ${corrAllData.length} garmin days · ${wxDays} weather days`;
}

// ── MFA relay ─────────────────────────────────────────────────────────────────
const mfaRef   = db.collection('_config').doc('garmin_mfa_pending');
const mfaPanel = document.getElementById('mfaPanel');
const mfaInput = document.getElementById('mfaCode');

mfaRef.onSnapshot(snap => {
  if (snap.exists && snap.data().status === 'waiting') {
    mfaPanel.classList.add('visible');
    mfaInput.focus();
    document.getElementById('mfaStatus').textContent = 'workflow is waiting — enter the code from your garmin email';
  } else {
    mfaPanel.classList.remove('visible');
    mfaInput.value = '';
    document.getElementById('mfaStatus').textContent = '';
  }
});

// auto-submit when 6 digits entered
mfaInput.addEventListener('input', () => {
  if (mfaInput.value.replace(/\D/g,'').length === 6) submitMfa();
});

function submitMfa() {
  const code = mfaInput.value.replace(/\D/g,'');
  if (code.length !== 6) { document.getElementById('mfaStatus').textContent = 'enter 6-digit code'; return; }
  document.getElementById('mfaStatus').textContent = 'submitting...';
  mfaRef.set({ status: 'submitted', code }, { merge: true })
    .then(() => { document.getElementById('mfaStatus').textContent = '✓ code sent — workflow resuming'; })
    .catch(e => { document.getElementById('mfaStatus').textContent = 'error: ' + e.message; });
}
</script>
