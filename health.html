<!-- ══════════════════════════════════════════════════════ App -->
<script>
let activeDays = 7;
let allDocs    = [];
let charts     = {};

// ── range picker ──────────────────────────────────────────────────────────────
document.getElementById('rangeRow').addEventListener('click', e => {
  const btn = e.target.closest('.range-btn');
  if (!btn) return;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeDays = parseInt(btn.dataset.days);
  render(allDocs);
});

// ── load data ─────────────────────────────────────────────────────────────────
function dateStr(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString().slice(0, 10);
}

col.orderBy('date', 'asc').onSnapshot(snap => {
  allDocs = snap.docs.map(d => d.data());
  render(allDocs);
}, err => {
  document.getElementById('status').textContent = 'error loading data — ' + err.message;
});

// ── render ────────────────────────────────────────────────────────────────────
function render(docs) {
  const cutoff = dateStr(activeDays - 1);
  const data   = docs.filter(d => d.date >= cutoff).sort((a,b) => a.date.localeCompare(b.date));

  if (!data.length) {
    renderEmpty();
    return;
  }

  document.getElementById('status').textContent =
    `${data.length} days loaded · last sync: ${data[data.length-1]?.syncedAt?.toDate?.()?.toLocaleString?.() ?? 'unknown'}`;

  renderStats(data);
  renderCharts(data);
  // correlations always use full 90-day history for stable rolling windows
  const corrData = allDocs.filter(d => d.date >= dateStr(89)).sort((a,b) => a.date.localeCompare(b.date));
  loadAndRenderCorrelations(corrData).catch(e => {
    document.getElementById('correlStatus').textContent = 'weather unavailable — ' + e.message;
  });
}

function renderEmpty() {
  document.getElementById('statGrid').innerHTML = '';
  document.getElementById('chartGrid').innerHTML = `
    <div class="no-data" style="grid-column:1/-1">
      no health data yet.<br><br>
      run the <a href="https://github.com/tigerbot82/myCloudeTest/actions" target="_blank">garmin sync workflow</a>
      to pull your data from garmin connect.
    </div>`;
  document.getElementById('status').textContent = 'no data in selected range';
}

// ── today's stat cards ────────────────────────────────────────────────────────
function renderStats(data) {
  const today = data[data.length - 1];
  const cards = [
    { icon:'👣', label:'steps',       value: fmt(today.steps),              unit:'steps',   },
    { icon:'🔥', label:'calories',    value: fmt(today.calories),           unit:'kcal',    },
    { icon:'💓', label:'resting hr',  value: today.restingHR ?? '—',        unit:'bpm',     },
    { icon:'⚡', label:'body battery',value: today.bodyBattery?.end ?? '—', unit:'/ 100',   },
    { icon:'😰', label:'avg stress',  value: today.avgStress ?? '—',        unit:'/ 100',   },
    { icon:'🌊', label:'hrv',         value: today.hrv?.lastNight ?? '—',   unit:'ms',      },
    { icon:'😴', label:'sleep',       value: today.sleep?.durationHours ?? '—', unit:'hrs', },
    { icon:'🩸', label:'spo2',        value: today.spo2?.avg ?? '—',        unit:'%',       },
  ];

  document.getElementById('statGrid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-icon">${c.icon}</div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-unit">${c.unit}</div>
      <div class="stat-date">latest: ${today.date}</div>
    </div>`).join('');
}

// ── charts ────────────────────────────────────────────────────────────────────
const GRID_COLOR = 'rgba(14,184,255,0.06)';
const TICK_COLOR = 'rgba(14,184,255,0.32)';

const chartDefs = [
  { id:'steps',       title:'// steps //',         key: d => d.steps,                  color:'rgba(14,184,255,0.85)' },
  { id:'hrv',         title:'// hrv (last night) //', key: d => d.hrv?.lastNight,       color:'rgba(160,80,255,0.85)' },
  { id:'rhr',         title:'// resting heart rate //', key: d => d.restingHR,           color:'rgba(255,80,140,0.85)' },
  { id:'stress',      title:'// avg stress //',     key: d => d.avgStress,              color:'rgba(255,200,80,0.85)' },
  { id:'battery',     title:'// body battery (end) //', key: d => d.bodyBattery?.end,   color:'rgba(80,220,160,0.85)' },
  { id:'sleep',       title:'// sleep duration //', key: d => d.sleep?.durationHours,   color:'rgba(80,160,255,0.85)' },
  { id:'spo2',        title:'// spo2 avg //',       key: d => d.spo2?.avg,              color:'rgba(80,220,255,0.85)' },
  { id:'calories',    title:'// active calories //',key: d => d.activeCalories,         color:'rgba(255,140,60,0.85)' },
];

function renderCharts(data) {
  const labels = data.map(d => d.date.slice(5)); // MM-DD

  // destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  // build HTML
  document.getElementById('chartGrid').innerHTML = chartDefs.map(def => `
    <div class="chart-panel">
      <div class="chart-title">${def.title}</div>
      <div class="chart-wrap"><canvas id="chart-${def.id}"></canvas></div>
    </div>`).join('') + `
    <div class="chart-panel">
      <div class="chart-title">// sleep stages //</div>
      <div class="chart-wrap"><canvas id="chart-sleepstages"></canvas></div>
    </div>`;

  // draw each line chart
  chartDefs.forEach(def => {
    const values = data.map(def.key);
    if (values.every(v => v == null)) return;
    charts[def.id] = makeLineChart(`chart-${def.id}`, labels, values, def.color);
  });

  // sleep stages stacked bar
  buildSleepStagesChart(data, labels);
}

function makeLineChart(canvasId, labels, values, color) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: color,
        backgroundColor: color.replace('0.85','0.10'),
        borderWidth: 1.5,
        pointRadius: 3,
        pointBackgroundColor: color,
        fill: true,
        tension: 0.35,
        spanGaps: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { ...tooltipStyle() } },
      scales: {
        x: { grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 } } },
        y: { grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 } }, beginAtZero: false },
      }
    }
  });
}

function buildSleepStagesChart(data, labels) {
  const deep  = data.map(d => d.sleep?.deepSleepHours  ?? null);
  const rem   = data.map(d => d.sleep?.remSleepHours   ?? null);
  const light = data.map(d => d.sleep?.lightSleepHours ?? null);
  const awake = data.map(d => d.sleep?.awakeHours      ?? null);
  if ([...deep,...rem,...light].every(v => v == null)) return;

  const ctx = document.getElementById('chart-sleepstages').getContext('2d');
  charts['sleepstages'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'deep',  data: deep,  backgroundColor:'rgba(12,123,192,0.85)',  stack:'s' },
        { label:'rem',   data: rem,   backgroundColor:'rgba(160,80,255,0.8)',   stack:'s' },
        { label:'light', data: light, backgroundColor:'rgba(80,160,255,0.6)',   stack:'s' },
        { label:'awake', data: awake, backgroundColor:'rgba(255,80,80,0.5)',    stack:'s' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, labels: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 }, boxWidth: 10 } },
        tooltip: { ...tooltipStyle() }
      },
      scales: {
        x: { stacked: true, grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 } } },
        y: { stacked: true, grid: { color: GRID_COLOR }, ticks: { color: TICK_COLOR, font: { family: 'Share Tech Mono', size: 10 } } },
      }
    }
  });
}

function tooltipStyle() {
  return {
    backgroundColor: 'rgba(4,6,18,0.97)',
    borderColor: 'rgba(14,184,255,0.22)',
    borderWidth: 1,
    titleColor: '#0eb8ff',
    bodyColor: 'rgba(14,184,255,0.65)',
    titleFont: { family: 'Share Tech Mono' },
    bodyFont:  { family: 'Share Tech Mono' },
  };
}

function fmt(n) { return n != null ? Number(n).toLocaleString() : '—'; }

function triggerManualNote() {
  alert('To sync data, go to GitHub Actions → "Garmin → Firestore Sync" → Run workflow.\n\nData auto-syncs daily at 07:00 UTC.');
}

// ── Weather correlations ──────────────────────────────────────────────────────
async function fetchWeather() {
  try {
    const c = JSON.parse(localStorage.getItem('health_wx_v3') || 'null');
    if (c && Date.now() - c.t < 3 * 3600 * 1000) return c.d;
  } catch(e) {}

  const url = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude=48.2416&longitude=16.4442'
    + '&daily=temperature_2m_mean,sunshine_duration,precipitation_sum,daylight_duration'
    + '&past_days=92&forecast_days=1'
    + '&timezone=Europe%2FVienna';

  const resp = await fetch(url);
  if (!resp.ok) throw new Error('open-meteo ' + resp.status);
  const j = await resp.json();

  const byDate = {};
  (j.daily?.time || []).forEach((d, i) => {
    byDate[d] = {
      tempMean: j.daily.temperature_2m_mean[i],
      sunshine: (j.daily.sunshine_duration[i] ?? 0) / 3600,
      daylight: (j.daily.daylight_duration[i] ?? 0) / 3600,
      precip:   j.daily.precipitation_sum[i],
    };
  });

  try { localStorage.setItem('health_wx_v3', JSON.stringify({t: Date.now(), d: byDate})); } catch(e) {}
  return byDate;
}

function pearson(xs, ys) {
  const pairs = xs.map((x,i) => [x, ys[i]]).filter(([x,y]) => x != null && y != null && !isNaN(x) && !isNaN(y));
  const n = pairs.length;
  if (n < 3) return null;
  const mx = pairs.reduce((s,[x]) => s+x, 0) / n;
  const my = pairs.reduce((s,[,y]) => s+y, 0) / n;
  let num=0, dx2=0, dy2=0;
  for (const [x,y] of pairs) {
    const a=x-mx, b=y-my;
    num += a*b; dx2 += a*a; dy2 += b*b;
  }
  const denom = Math.sqrt(dx2 * dy2);
  return denom < 1e-10 ? 0 : parseFloat((num/denom).toFixed(3));
}

function rollingCorr(dates, xs, ys, win=7) {
  return dates.slice(win-1).map((_, i) => ({
    date: dates[i+win-1],
    r:    pearson(xs.slice(i, i+win), ys.slice(i, i+win)),
  }));
}

function corrStyle(r) {
  if (r == null) return 'color:rgba(14,184,255,0.25);border-left-color:rgba(14,184,255,0.08)';
  const a = (0.35 + Math.abs(r) * 0.65).toFixed(2);
  const col = r >= 0 ? `rgba(14,184,255,${a})` : `rgba(255,80,80,${a})`;
  return `color:${col};border-left-color:${col}`;
}

let correlCharts = {};

async function loadAndRenderCorrelations(data) {
  const statusEl = document.getElementById('correlStatus');
  if (!data.length) { statusEl.textContent = 'no data'; return; }

  statusEl.textContent = 'fetching weather from open-meteo...';

  let wx;
  try { wx = await fetchWeather(); }
  catch(e) { throw e; }

  const dates = data.map(d => d.date);

  const H = {
    'HRV':          data.map(d => d.hrv?.lastNight        ?? null),
    'Sleep':        data.map(d => d.sleep?.durationHours  ?? null),
    'Stress':       data.map(d => d.avgStress             ?? null),
    'Body Battery': data.map(d => d.bodyBattery?.end      ?? null),
    'Steps':        data.map(d => d.steps                 ?? null),
    'Resting HR':   data.map(d => d.restingHR             ?? null),
  };
  const W = {
    'Temp °C':    dates.map(d => wx[d]?.tempMean ?? null),
    'Sunshine h': dates.map(d => wx[d]?.sunshine ?? null),
    'Daylight h': dates.map(d => wx[d]?.daylight ?? null),
    'Precip mm':  dates.map(d => wx[d]?.precip   ?? null),
  };

  const hKeys = Object.keys(H);
  const wKeys = Object.keys(W);

  const mat = {};
  hKeys.forEach(hk => { mat[hk] = {}; wKeys.forEach(wk => { mat[hk][wk] = pearson(H[hk], W[wk]); }); });

  Object.values(correlCharts).forEach(c => c.destroy());
  correlCharts = {};

  const pairs = [
    { h:'HRV',          w:'Temp °C',    hc:'rgba(160,80,255,0.85)'  },
    { h:'Sleep',        w:'Daylight h', hc:'rgba(80,160,255,0.85)'  },
    { h:'Stress',       w:'Sunshine h', hc:'rgba(255,200,80,0.85)'  },
    { h:'Body Battery', w:'Temp °C',    hc:'rgba(80,220,160,0.85)'  },
  ];

  const matrixHTML = `
    <div class="chart-panel" style="grid-column:1/-1">
      <div class="chart-title">// pearson r · biometrics vs weather · last ${dates.length} days //</div>
      <div class="correl-matrix">
        <div class="correl-row">
          <div class="correl-row-label"></div>
          ${wKeys.map(wk => `<div class="correl-hdr-cell">${wk}</div>`).join('')}
        </div>
        ${hKeys.map(hk => `
          <div class="correl-row">
            <div class="correl-row-label">${hk}</div>
            ${wKeys.map(wk => {
              const r = mat[hk][wk];
              return `<div class="correl-cell" style="${corrStyle(r)}" title="${hk} vs ${wk}: r=${r}">${r != null ? r : 'n/a'}</div>`;
            }).join('')}
          </div>`).join('')}
      </div>
      <div class="correl-legend">
        <span style="color:rgba(255,80,80,.85)">■ negative</span>
        <span style="color:rgba(14,184,255,.4)">■ near zero</span>
        <span style="color:rgba(14,184,255,.95)">■ positive</span>
        <span>&nbsp;· intensity = |r| · open-meteo · vienna 48.24°N · full history</span>
      </div>
    </div>`;

  const rollingHTML = pairs.map((p, i) => `
    <div class="chart-panel">
      <div class="chart-title">// 7-day rolling r · ${p.h.toLowerCase()} vs ${p.w.toLowerCase()} //</div>
      <div class="chart-wrap"><canvas id="cc-${i}"></canvas></div>
    </div>`).join('');

  document.getElementById('correlGrid').innerHTML = matrixHTML + rollingHTML;

  pairs.forEach((p, i) => {
    const roll = rollingCorr(dates, H[p.h], W[p.w]);
    if (!roll.length) return;
    const ctx = document.getElementById(`cc-${i}`).getContext('2d');
    correlCharts[i] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: roll.map(r => r.date.slice(5)),
        datasets: [{
          data: roll.map(r => r.r),
          borderColor: p.hc,
          backgroundColor: p.hc.replace('0.85','0.08'),
          borderWidth: 1.5, pointRadius: 3, pointBackgroundColor: p.hc,
          fill: true, tension: 0.35, spanGaps: true,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: {display:false}, tooltip: {...tooltipStyle()} },
        scales: {
          x: { grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR, font:{family:'Share Tech Mono',size:10}} },
          y: {
            grid: {color:GRID_COLOR},
            ticks: { color:TICK_COLOR, font:{family:'Share Tech Mono',size:10}, callback: v => v.toFixed(1) },
            min: -1, max: 1,
            afterBuildTicks: ax => { ax.ticks = [-1,-0.5,0,0.5,1].map(v => ({value:v})); },
          },
        }
      }
    });
  });

  statusEl.textContent = `weather · vienna 1220 · open-meteo · ${dates.length} days · cached 3h`;
}

// ── MFA relay ─────────────────────────────────────────────────────────────────
const mfaRef   = db.collection('_config').doc('garmin_mfa_pending');
const mfaPanel = document.getElementById('mfaPanel');
const mfaInput = document.getElementById('mfaCode');

mfaRef.onSnapshot(snap => {
  if (snap.exists && snap.data().status === 'waiting') {
    mfaPanel.classList.add('visible');
    mfaInput.focus();
    document.getElementById('mfaStatus').textContent = 'workflow is waiting — enter the code from your garmin email';
  } else {
    mfaPanel.classList.remove('visible');
    mfaInput.value = '';
    document.getElementById('mfaStatus').textContent = '';
  }
});

// auto-submit when 6 digits entered
mfaInput.addEventListener('input', () => {
  if (mfaInput.value.replace(/\D/g,'').length === 6) submitMfa();
});

function submitMfa() {
  const code = mfaInput.value.replace(/\D/g,'');
  if (code.length !== 6) { document.getElementById('mfaStatus').textContent = 'enter 6-digit code'; return; }
  document.getElementById('mfaStatus').textContent = 'submitting...';
  mfaRef.set({ status: 'submitted', code }, { merge: true })
    .then(() => { document.getElementById('mfaStatus').textContent = '✓ code sent — workflow resuming'; })
    .catch(e => { document.getElementById('mfaStatus').textContent = 'error: ' + e.message; });
}
</script>
