<script>
let activeDays = 7;
let allDocs    = [];
let charts     = {};
let wxData     = null;
let aqData     = null;

const GRID_COLOR = 'rgba(14,184,255,0.1)';
const TICK_COLOR = 'rgba(220,240,255,0.95)';

// ── Weather + AQ fetch (same cache as correlations page) ──────────
async function fetchWeatherArchive(startDate) {
  const endDate = new Date().toISOString().slice(0, 10);
  const cKey = `health_wx_arch_${startDate}`;
  try {
    const c = JSON.parse(localStorage.getItem(cKey) || 'null');
    if (c && Date.now() - c.t < 12 * 3600 * 1000) return c.d;
  } catch(e) {}
  const url = 'https://archive-api.open-meteo.com/v1/archive'
    + '?latitude=48.2416&longitude=16.4442'
    + '&daily=temperature_2m_mean,sunshine_duration,precipitation_sum,daylight_duration'
    + `&start_date=${startDate}&end_date=${endDate}&timezone=Europe%2FVienna`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('weather ' + resp.status);
  const j = await resp.json();
  const byDate = {};
  (j.daily?.time || []).forEach((d, i) => {
    byDate[d] = {
      tempMean: j.daily.temperature_2m_mean[i],
      sunshine: (j.daily.sunshine_duration[i] ?? 0) / 3600,
      daylight: (j.daily.daylight_duration[i] ?? 0) / 3600,
      precip:   j.daily.precipitation_sum[i] ?? 0,
    };
  });
  try { localStorage.setItem(cKey, JSON.stringify({t: Date.now(), d: byDate})); } catch(e) {}
  return byDate;
}

async function fetchAirQualityArchive(startDate) {
  const endDate = new Date().toISOString().slice(0, 10);
  const cKey = `health_aq_arch_${startDate}`;
  try {
    const c = JSON.parse(localStorage.getItem(cKey) || 'null');
    if (c && Date.now() - c.t < 12 * 3600 * 1000) return c.d;
  } catch(e) {}
  const url = 'https://air-quality-api.open-meteo.com/v1/air-quality'
    + '?latitude=48.2416&longitude=16.4442'
    + '&hourly=pm2_5,pm10,nitrogen_dioxide,ozone,european_aqi,uv_index'
    + `&start_date=${startDate}&end_date=${endDate}&timezone=Europe%2FVienna`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('air quality ' + resp.status);
  const j = await resp.json();
  const acc = {};
  (j.hourly?.time || []).forEach((ts, i) => {
    const date = ts.slice(0, 10);
    if (!acc[date]) acc[date] = { pm2_5:[], pm10:[], no2:[], o3:[], aqi:[], uv:[] };
    const a = acc[date];
    if (j.hourly.pm2_5?.[i]            != null) a.pm2_5.push(j.hourly.pm2_5[i]);
    if (j.hourly.pm10?.[i]             != null) a.pm10.push(j.hourly.pm10[i]);
    if (j.hourly.nitrogen_dioxide?.[i] != null) a.no2.push(j.hourly.nitrogen_dioxide[i]);
    if (j.hourly.ozone?.[i]            != null) a.o3.push(j.hourly.ozone[i]);
    if (j.hourly.european_aqi?.[i]     != null) a.aqi.push(j.hourly.european_aqi[i]);
    if (j.hourly.uv_index?.[i]         != null) a.uv.push(j.hourly.uv_index[i]);
  });
  const mean = arr => arr.length ? arr.reduce((s,v)=>s+v,0)/arr.length : null;
  const max  = arr => arr.length ? Math.max(...arr) : null;
  const byDate = {};
  for (const [date, a] of Object.entries(acc)) {
    byDate[date] = { pm2_5:mean(a.pm2_5), pm10:mean(a.pm10), no2:mean(a.no2),
      o3:mean(a.o3), aqi:mean(a.aqi), uv:max(a.uv) };
  }
  try { localStorage.setItem(cKey, JSON.stringify({t: Date.now(), d: byDate})); } catch(e) {}
  return byDate;
}

document.getElementById('rangeRow').addEventListener('click', e => {
  const btn = e.target.closest('.range-btn');
  if (!btn) return;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeDays = parseInt(btn.dataset.days);
  render(allDocs);
});

function dateStr(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString().slice(0, 10);
}

col.orderBy('date', 'asc').onSnapshot(snap => {
  allDocs = snap.docs.map(d => d.data());
  render(allDocs);
  // Kick off env fetch in background; re-render stat cards when ready
  const startDate = allDocs.find(d => d.date)?.date;
  if (startDate && wxData === null) {
    Promise.all([fetchWeatherArchive(startDate), fetchAirQualityArchive(startDate)])
      .then(([wx, aq]) => {
        wxData = wx; aqData = aq;
        if (activeCat === 'weather' || activeCat === 'airquality') render(allDocs);
      }).catch(() => {});
  }
}, err => {
  document.getElementById('status').textContent = 'error loading data — ' + err.message;
});

function render(docs) {
  const cutoff = dateStr(activeDays - 1);
  const data   = docs.filter(d => d.date >= cutoff).sort((a,b) => a.date.localeCompare(b.date));
  if (!data.length) {
    document.getElementById('statGrid').innerHTML = '';
    document.getElementById('chartGrid').innerHTML = `
      <div class="no-data" style="grid-column:1/-1">no health data yet.<br><br>
        run the <a href="https://github.com/tigerbot82/myCloudeTest/actions" target="_blank">garmin sync workflow</a>
        to pull your data from garmin connect.</div>`;
    document.getElementById('status').textContent = 'no data in selected range';
    return;
  }
  document.getElementById('status').textContent =
    `${data.length} days · last sync: ${data[data.length-1]?.syncedAt?.toDate?.()?.toLocaleString?.() ?? 'unknown'}`;
  window._healthData = data;
  renderStats(data);
  renderCharts(data);
}

const STAT_CATEGORIES = {
  all:      null, // null = show all with data
  activity: ['steps','calories','active cal','distance','intensity','floors','sedentary hrs','hydration'],
  sleep:    ['sleep','deep sleep','rem sleep','light sleep','sleep score','sleep body','sleep mind','restlessness'],
  recovery: ['hrv','hrv weekly','body battery','battery charged','avg stress','readiness','endurance','fitness age'],
  vitals:   ['resting hr','breathing','spo2','spo2 min','blood pressure'],
  fitness:  ['vo2max','hill score'],
  body:     ['weight','body fat %','muscle mass','body water'],
  weather:  ['temp °c','sunshine h','daylight h','precip mm'],
  airquality: ['pm2.5','pm10','no₂','o₃','aqi','uv index'],
};
let activeCat = 'all';

function renderStats(data) {
  const today = data[data.length - 1];
  const ALL_CARDS = [
    // activity
    { cat:'activity', icon:'👣', label:'steps',          value: fmt(today.steps),                           unit:'steps'      },
    { cat:'activity', icon:'🔥', label:'calories',       value: fmt(today.calories),                        unit:'kcal'       },
    { cat:'activity', icon:'⚡️', label:'active cal',     value: fmt(today.activeCalories),                  unit:'kcal'       },
    { cat:'activity', icon:'🏃', label:'distance',       value: today.distanceKm ?? '—',                    unit:'km'         },
    { cat:'activity', icon:'⏱', label:'intensity',      value: today.intensityMinutes ?? '—',               unit:'min'        },
    { cat:'activity', icon:'🏢', label:'floors',         value: today.floors ?? '—',                        unit:'floors'     },
    { cat:'activity', icon:'🪑', label:'sedentary hrs',  value: today.sedentaryHours ?? '—',                unit:'hrs'        },
    { cat:'activity', icon:'💧', label:'hydration',      value: today.hydration?.intakeMl ? Math.round(today.hydration.intakeMl)+'ml' : '—', unit: today.hydration?.goalMl ? `/ ${Math.round(today.hydration.goalMl)}ml` : '' },
    // sleep
    { cat:'sleep',    icon:'😴', label:'sleep',          value: today.sleep?.durationHours ?? '—',          unit:'hrs'        },
    { cat:'sleep',    icon:'🌑', label:'deep sleep',     value: today.sleep?.deepSleepHours ?? '—',         unit:'hrs'        },
    { cat:'sleep',    icon:'💜', label:'rem sleep',      value: today.sleep?.remSleepHours ?? '—',          unit:'hrs'        },
    { cat:'sleep',    icon:'🌤', label:'light sleep',    value: today.sleep?.lightSleepHours ?? '—',        unit:'hrs'        },
    { cat:'sleep',    icon:'⭐', label:'sleep score',    value: today.sleep?.score ?? '—',                  unit:'/ 100'      },
    { cat:'sleep',    icon:'🫀', label:'sleep body',     value: today.sleep?.bodyScore ?? '—',              unit:'/ 100'      },
    { cat:'sleep',    icon:'🧠', label:'sleep mind',     value: today.sleep?.mindScore ?? '—',              unit:'/ 100'      },
    { cat:'sleep',    icon:'🌀', label:'restlessness',   value: today.sleep?.restlessness ?? '—',           unit:'/ 100'      },
    // recovery
    { cat:'recovery', icon:'🌊', label:'hrv',            value: today.hrv?.lastNight ?? '—',                unit:'ms'         },
    { cat:'recovery', icon:'📊', label:'hrv weekly',     value: today.hrv?.weeklyAvg ?? '—',                unit:'ms avg'     },
    { cat:'recovery', icon:'⚡', label:'body battery',   value: today.bodyBattery?.end ?? '—',              unit:'/ 100'      },
    { cat:'recovery', icon:'🔋', label:'battery charged',value: today.bodyBattery?.charged ?? '—',          unit:'pts'        },
    { cat:'recovery', icon:'😰', label:'avg stress',     value: today.avgStress ?? '—',                     unit:'/ 100'      },
    { cat:'recovery', icon:'🏋️', label:'readiness',     value: today.trainingReadiness ?? '—',             unit:'/ 100'      },
    { cat:'recovery', icon:'🏅', label:'endurance',      value: today.enduranceScore ?? '—',                unit:'score'      },
    { cat:'recovery', icon:'🧬', label:'fitness age',    value: today.fitnessAge ?? '—',                    unit:'yrs'        },
    // vitals
    { cat:'vitals',   icon:'💓', label:'resting hr',     value: today.restingHR ?? '—',                     unit:'bpm'        },
    { cat:'vitals',   icon:'🫁', label:'breathing',      value: today.respiration?.avg ?? '—',              unit:'br/min'     },
    { cat:'vitals',   icon:'🩸', label:'spo2',           value: today.spo2?.avg ?? '—',                     unit:'%'          },
    { cat:'vitals',   icon:'📉', label:'spo2 min',       value: today.spo2?.min ?? '—',                     unit:'% min'      },
    { cat:'vitals',   icon:'🩺', label:'blood pressure', value: today.bloodPressure ? `${today.bloodPressure.systolic}/${today.bloodPressure.diastolic}` : '—', unit:'mmHg' },
    // fitness
    { cat:'fitness',  icon:'❤️', label:'vo2max',         value: today.vo2max ?? '—',                        unit:'ml/kg/min'  },
    { cat:'fitness',  icon:'⛰️', label:'hill score',     value: today.hillScore ?? '—',                     unit:'score'      },
    // body
    { cat:'body',     icon:'⚖️', label:'weight',         value: today.weight?.kg ?? '—',                    unit:'kg'         },
    { cat:'body',     icon:'📐', label:'body fat %',     value: today.weight?.bodyFatPct ?? '—',            unit:'%'          },
    { cat:'body',     icon:'💪', label:'muscle mass',    value: today.weight?.muscleMassKg ?? '—',          unit:'kg'         },
    { cat:'body',     icon:'💦', label:'body water',     value: today.weight?.bodyWaterPct ?? '—',          unit:'%'          },
  ];

  // ── Weather + AQ cards (use latest available date) ────────────
  const envDate = wxData
    ? ([...Object.keys(wxData)].sort().reverse().find(d => d <= today.date) ?? today.date)
    : today.date;
  const wx = wxData?.[envDate];
  const aq = aqData?.[envDate];
  const r1 = v => v != null ? Math.round(v * 10) / 10 : '—';
  const r0 = v => v != null ? Math.round(v) : '—';
  const envCards = [
    { cat:'weather',    icon:'🌡️', label:'temp °c',    value: wx ? r1(wx.tempMean)  : (wxData ? '—' : '…'), unit:'°C'      },
    { cat:'weather',    icon:'☀️',  label:'sunshine h', value: wx ? r1(wx.sunshine)  : (wxData ? '—' : '…'), unit:'h'       },
    { cat:'weather',    icon:'🌅',  label:'daylight h', value: wx ? r1(wx.daylight)  : (wxData ? '—' : '…'), unit:'h'       },
    { cat:'weather',    icon:'🌧️', label:'precip mm',  value: wx ? r1(wx.precip)    : (wxData ? '—' : '…'), unit:'mm'      },
    { cat:'airquality', icon:'🔬',  label:'pm2.5',      value: aq ? r1(aq.pm2_5)    : (aqData ? '—' : '…'), unit:'µg/m³'   },
    { cat:'airquality', icon:'💨',  label:'pm10',       value: aq ? r1(aq.pm10)     : (aqData ? '—' : '…'), unit:'µg/m³'   },
    { cat:'airquality', icon:'🟤',  label:'no₂',        value: aq ? r1(aq.no2)      : (aqData ? '—' : '…'), unit:'µg/m³'   },
    { cat:'airquality', icon:'🟣',  label:'o₃',         value: aq ? r1(aq.o3)       : (aqData ? '—' : '…'), unit:'µg/m³'   },
    { cat:'airquality', icon:'📊',  label:'aqi',        value: aq ? r0(aq.aqi)      : (aqData ? '—' : '…'), unit:'EU AQI'  },
    { cat:'airquality', icon:'🌞',  label:'uv index',   value: aq ? r1(aq.uv)       : (aqData ? '—' : '…'), unit:''        },
  ];
  ALL_CARDS.push(...envCards);

  const defaultVisible = ['steps','calories','resting hr','body battery','avg stress','hrv','sleep','spo2','distance','intensity','breathing','vo2max','readiness','weight'];
  const catKeys = STAT_CATEGORIES[activeCat];
  const cards = ALL_CARDS.filter(c => {
    if (c.value === '—') {
      if (activeCat === 'all') return defaultVisible.includes(c.label);
      return catKeys?.includes(c.label);
    }
    if (activeCat === 'all') return true;
    return catKeys?.includes(c.label);
  });

  // Render category tabs
  const tabs = Object.keys(STAT_CATEGORIES);
  document.getElementById('statTabs').innerHTML = tabs.map(t =>
    `<button class="stat-tab${t===activeCat?' active':''}" onclick="activeCat='${t}';renderStats(window._healthData)">${t}</button>`
  ).join('');

  const isEnvTab = activeCat === 'weather' || activeCat === 'airquality';
  const displayDate = isEnvTab ? (envDate ?? today.date) : today.date;
  document.getElementById('statGrid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-icon">${c.icon}</div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-unit">${c.unit}</div>
      <div class="stat-date">latest: ${displayDate}</div>
    </div>`).join('');
}

const chartDefs = [
  { id:'steps',    title:'// steps //',              key: d => d.steps,                  color:'rgba(14,184,255,0.85)' },
  { id:'hrv',      title:'// hrv (last night) //',   key: d => d.hrv?.lastNight,         color:'rgba(160,80,255,0.85)' },
  { id:'rhr',      title:'// resting heart rate //', key: d => d.restingHR,              color:'rgba(255,80,140,0.85)' },
  { id:'stress',   title:'// avg stress //',         key: d => d.avgStress,              color:'rgba(255,200,80,0.85)' },
  { id:'battery',  title:'// body battery (end) //', key: d => d.bodyBattery?.end,       color:'rgba(80,220,160,0.85)' },
  { id:'sleep',    title:'// sleep duration //',     key: d => d.sleep?.durationHours,   color:'rgba(80,160,255,0.85)' },
  { id:'spo2',     title:'// spo2 avg //',           key: d => d.spo2?.avg,              color:'rgba(80,220,255,0.85)' },
  { id:'calories', title:'// active calories //',    key: d => d.activeCalories,         color:'rgba(255,140,60,0.85)'  },
];

function renderCharts(data) {
  const labels = data.map(d => d.date.slice(5));
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  document.getElementById('chartGrid').innerHTML = chartDefs.map(def => `
    <div class="chart-panel">
      <div class="chart-title">${def.title}</div>
      <div class="chart-wrap"><canvas id="chart-${def.id}"></canvas></div>
    </div>`).join('') + `
    <div class="chart-panel">
      <div class="chart-title">// sleep stages //</div>
      <div class="chart-wrap"><canvas id="chart-sleepstages"></canvas></div>
    </div>`;
  chartDefs.forEach(def => {
    const values = data.map(def.key);
    if (values.every(v => v == null)) return;
    charts[def.id] = makeLineChart(`chart-${def.id}`, labels, values, def.color);
  });
  buildSleepStagesChart(data, labels);
}

function makeLineChart(canvasId, labels, values, color) {
  return new Chart(document.getElementById(canvasId).getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [{
      data: values, borderColor: color, backgroundColor: color.replace('0.85','0.10'),
      borderWidth: 1.5, pointRadius: 3, pointBackgroundColor: color,
      fill: true, tension: 0.35, spanGaps: true,
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { ...tooltipStyle() } },
      scales: {
        x: { grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:12}} },
        y: { grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:12}}, beginAtZero:false },
      }
    }
  });
}

function buildSleepStagesChart(data, labels) {
  const deep  = data.map(d => d.sleep?.deepSleepHours  ?? null);
  const rem   = data.map(d => d.sleep?.remSleepHours   ?? null);
  const light = data.map(d => d.sleep?.lightSleepHours ?? null);
  const awake = data.map(d => d.sleep?.awakeHours      ?? null);
  if ([...deep,...rem,...light].every(v => v == null)) return;
  charts['sleepstages'] = new Chart(document.getElementById('chart-sleepstages').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [
      { label:'deep',  data:deep,  backgroundColor:'rgba(12,123,192,0.85)', stack:'s' },
      { label:'rem',   data:rem,   backgroundColor:'rgba(160,80,255,0.8)',  stack:'s' },
      { label:'light', data:light, backgroundColor:'rgba(80,160,255,0.6)',  stack:'s' },
      { label:'awake', data:awake, backgroundColor:'rgba(255,80,80,0.5)',   stack:'s' },
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display:true, labels:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:12},boxWidth:10} }, tooltip:{...tooltipStyle()} },
      scales: {
        x: { stacked:true, grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:12}} },
        y: { stacked:true, grid:{color:GRID_COLOR}, ticks:{color:TICK_COLOR,font:{family:'Share Tech Mono',size:12}} },
      }
    }
  });
}

function tooltipStyle() {
  return { backgroundColor:'rgba(4,6,18,0.97)', borderColor:'rgba(14,184,255,0.45)', borderWidth:1,
    titleColor:'#0eb8ff', bodyColor:'rgba(200,230,255,0.82)',
    titleFont:{family:'Share Tech Mono'}, bodyFont:{family:'Share Tech Mono'} };
}

function fmt(n) { return n != null ? Number(n).toLocaleString() : '—'; }

function triggerManualNote() {
  alert('To sync data, go to GitHub Actions → "Garmin → Firestore Sync" → Run workflow.\n\nData auto-syncs daily at 07:00 UTC.');
}

// ── MFA relay ─────────────────────────────────────────────────────
const mfaRef   = db.collection('_config').doc('garmin_mfa_pending');
const mfaPanel = document.getElementById('mfaPanel');
const mfaInput = document.getElementById('mfaCode');

mfaRef.onSnapshot(snap => {
  if (snap.exists && snap.data().status === 'waiting') {
    mfaPanel.classList.add('visible');
    mfaInput.focus();
    document.getElementById('mfaStatus').textContent = 'workflow is waiting — enter the code from your garmin email';
  } else {
    mfaPanel.classList.remove('visible');
    mfaInput.value = '';
    document.getElementById('mfaStatus').textContent = '';
  }
});

mfaInput.addEventListener('input', () => {
  if (mfaInput.value.replace(/\D/g,'').length === 6) submitMfa();
});

function submitMfa() {
  const code = mfaInput.value.replace(/\D/g,'');
  if (code.length !== 6) { document.getElementById('mfaStatus').textContent = 'enter 6-digit code'; return; }
  document.getElementById('mfaStatus').textContent = 'submitting...';
  mfaRef.set({ status:'submitted', code }, { merge:true })
    .then(() => { document.getElementById('mfaStatus').textContent = '✓ code sent — workflow resuming'; })
    .catch(e  => { document.getElementById('mfaStatus').textContent = 'error: ' + e.message; });
}

// ── Lifestyle Log ──────────────────────────────────────────────────────────
const customVarsRef = db.collection('_config').doc('custom_vars');
let logVarDefs = [];   // [{name, unit}]
let logDate    = new Date().toISOString().slice(0, 10);
let logValues  = {};   // name → current value for logDate

function fmtLogDate(ds) {
  const [y,m,d] = ds.split('-');
  return `${d}.${m}.${y}`;
}

function logNavDay(delta) {
  const dt = new Date(logDate);
  dt.setDate(dt.getDate() + delta);
  const newDate = dt.toISOString().slice(0, 10);
  if (newDate > new Date().toISOString().slice(0, 10)) return; // don't go to future
  logDate = newDate;
  document.getElementById('logNext').disabled = logDate >= new Date().toISOString().slice(0, 10);
  loadLogForDate(logDate);
}

function renderLogVars() {
  const container = document.getElementById('logVars');
  if (!logVarDefs.length) {
    container.innerHTML = '<div style="font-size:.88em;color:rgba(14,184,255,.60);grid-column:1/-1">no variables defined yet — add one below</div>';
    return;
  }
  container.innerHTML = logVarDefs.map(v => `
    <div class="log-var">
      <div style="display:flex;align-items:center;gap:6px">
        <div class="log-var-label">${v.name}</div>
        <button class="log-var-del" onclick="deleteLogVar('${v.name}')" title="remove variable">✕</button>
      </div>
      <div class="log-var-row">
        <input class="log-var-input" id="logval-${v.name.replace(/\s/g,'_')}"
          type="number" step="0.1" placeholder="—"
          value="${logValues[v.name] != null ? logValues[v.name] : ''}">
        <span class="log-var-unit">${v.unit}</span>
      </div>
    </div>`).join('');
}

function loadLogForDate(date) {
  document.getElementById('logDateLabel').textContent = fmtLogDate(date);
  col.doc(date).get().then(snap => {
    logValues = (snap.exists && snap.data().custom) ? {...snap.data().custom} : {};
    renderLogVars();
  });
}

function addLogVar() {
  const nameEl = document.getElementById('logNewName');
  const unitEl = document.getElementById('logNewUnit');
  const name   = nameEl.value.trim();
  const unit   = unitEl.value.trim();
  if (!name) { setLogStatus('enter a variable name'); return; }
  if (logVarDefs.some(v => v.name.toLowerCase() === name.toLowerCase())) {
    setLogStatus('variable already exists'); return;
  }
  logVarDefs.push({ name, unit });
  nameEl.value = ''; unitEl.value = '';
  saveVarDefs().then(() => { renderLogVars(); setLogStatus(`added: ${name}`); });
}

function deleteLogVar(name) {
  logVarDefs = logVarDefs.filter(v => v.name !== name);
  saveVarDefs().then(() => { renderLogVars(); setLogStatus(`removed: ${name}`); });
}

function saveVarDefs() {
  return customVarsRef.set({ vars: logVarDefs }, { merge: false });
}

function saveLog() {
  const custom = {};
  logVarDefs.forEach(v => {
    const el = document.getElementById('logval-' + v.name.replace(/\s/g,'_'));
    if (el && el.value !== '') custom[v.name] = parseFloat(el.value);
  });
  if (!Object.keys(custom).length) { setLogStatus('nothing to save'); return; }
  setLogStatus('saving...');
  col.doc(logDate).set({ custom }, { merge: true })
    .then(() => setLogStatus('✓ saved for ' + fmtLogDate(logDate)))
    .catch(e => setLogStatus('error: ' + e.message));
}

function setLogStatus(msg) {
  const el = document.getElementById('logStatus');
  if (el) { el.textContent = msg; clearTimeout(el._t); el._t = setTimeout(() => el.textContent = '', 4000); }
}

// Bootstrap log panel
customVarsRef.get().then(snap => {
  logVarDefs = (snap.exists && snap.data().vars) ? snap.data().vars : [];
  loadLogForDate(logDate);
}).catch(() => { loadLogForDate(logDate); });
</script>
